        run: |
          set -euo pipefail
          docker run -d \
            --name "$CONTAINER_NAME" \
            -u "$(id -u):$(id -g)" \
            -v "$PWD/bazel-remote-data:/data" \
            -p 127.0.0.1:9090:8080 \
            "$BAZEL_REMOTE_IMAGE" \
            --dir /data \
            --max_size 20

          for _ in $(seq 1 60); do
            if curl -fsSL "$BAZEL_REMOTE_URL/status" >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          echo "bazel-remote did not become ready" >&2
          docker logs "$CONTAINER_NAME" || true
          exit 1

      - name: Configure Bazel remote cache
        run: |
          cat > ~/.bazelrc <<EOF
          build --remote_cache=${BAZEL_REMOTE_URL}
          build --remote_upload_local_results=true
          build --remote_cache_async=false
          build --remote_download_minimal
          build --jobs=256
          build --remote_max_connections=64
          build --experimental_remote_cache_eviction_retries=5
          EOF

      - name: Clean Bazel for warm build 1
        run: bazel clean --expunge

      - name: Run warm build 1
        id: warm1_build
        run: |
          set -euo pipefail
          start="$(date +%s)"
          ./run-grpc-bazel-build.sh --profile=/tmp/bazel-warm1-profile.gz 2>&1 | tee /tmp/bazel-warm1-build.log
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Flush Bazel server state
        if: always()
        run: bazel shutdown || true

      - name: Collect bazel-remote diagnostics
        if: always()
        env:
          CONTAINER_NAME: bazel-remote-warm1
        run: |
          set -euo pipefail
          .benchmark-config/scripts/collect-bazel-remote-diagnostics.sh \
            --output-dir "bazel-remote-diag-warm1" \
            --phase "warm1" \
            --cache-tag "warm1" \
            --remote-url "$BAZEL_REMOTE_URL" \
            --container-name "$CONTAINER_NAME" \
            --cache-root "$HOME/.cache/bazel" \
            --cache-label "bazel-cache"

      - name: Summarize Bazel miss profile
        if: always()
        run: |
          set -euo pipefail
          out_dir="bazel-remote-diag-warm1"
          mkdir -p "$out_dir"
          if [[ -f /tmp/bazel-warm1-build.log ]]; then
            cp /tmp/bazel-warm1-build.log "${out_dir}/bazel-warm1-build.log"
          fi
          if [[ -f /tmp/bazel-warm1-profile.gz && -f /tmp/bazel-warm1-build.log ]]; then
            cp /tmp/bazel-warm1-profile.gz "${out_dir}/bazel-warm1-profile.gz"
            python3 .benchmark-config/scripts/summarize-bazel-profile.py \
              --profile /tmp/bazel-warm1-profile.gz \
              --build-log /tmp/bazel-warm1-build.log \
              --output-dir "$out_dir" \
              --phase "warm1"
          fi

      - name: Stop bazel-remote
        if: always()
        env:
          CONTAINER_NAME: bazel-remote-warm1
        run: |
          docker stop "$CONTAINER_NAME" >/dev/null 2>&1 || true
          docker rm "$CONTAINER_NAME" >/dev/null 2>&1 || true

      - name: Upload bazel-remote data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bazel-remote-data-${{ env.BENCHMARK_ID }}-warm1
          path: bazel-remote-data
          if-no-files-found: error
          compression-level: 0

      - name: Upload Bazel profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bazel-remote-warm1-profile
          path: /tmp/bazel-warm1-profile.gz
          if-no-files-found: warn

      - name: Upload bazel-remote diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bazel-remote-diag-${{ env.BENCHMARK_ID }}-warm1-control
          path: bazel-remote-diag-warm1
          if-no-files-found: warn

      - name: Persist scenario timing artifact
        if: always()
        run: |
          set -euo pipefail
          mkdir -p benchmark-phase
          cat > "benchmark-phase/warm1.env" <<EOF
          phase=warm1
          seconds=${{ steps.warm1_build.outputs.seconds }}
          EOF

      - name: Upload scenario timing artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-phase-${{ env.BENCHMARK_ID }}-bazel-remote-warm1
          path: benchmark-phase/warm1.env
          if-no-files-found: error

  warm2-build:
    name: Bazel Warm 2 (bazel-remote)
    needs: warm1-build
    runs-on: ubuntu-latest
    timeout-minutes: 300
    outputs:
      warm2_seconds: ${{ steps.warm2_build.outputs.seconds }}
    steps:
