name: "gRPC Bazel - bazel-remote Control"

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/grpc-bazel-bazel-remote-control.yml"
      - ".github/workflows/grpc-bazel-boringcache.yml"
      - ".github/workflows/grpc-bazel-actions-cache.yml"
      - "scripts/**"

permissions:
  contents: read

env:
  PROJECT_REPO: grpc/grpc
  PROJECT_REF: "93ab404fb2689edca91deb97f0dba449ac154379"
  BENCHMARK_ID: grpc-bazel
  BAZEL_TARGET: "//examples/cpp/csm:csm_greeter_client"
  BAZEL_REMOTE_URL: http://127.0.0.1:9090
  BAZEL_REMOTE_IMAGE: buchgr/bazel-remote-cache@sha256:59dd70f320d9a7bf8abf6e4b3acccf62dee356627ce51a6fd0d511326636ae01

jobs:
  seed-cache:
    name: Bazel Seed (bazel-remote, cold)
    runs-on: ubuntu-latest
    timeout-minutes: 300
    outputs:
      cold_seconds: ${{ steps.cold_baseline_build.outputs.seconds }}
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PROJECT_REPO }}
          ref: ${{ env.PROJECT_REF }}
          submodules: true

      - name: Checkout benchmark config
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          path: .benchmark-config

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Prepare benchmark helpers
        run: |
          set -euo pipefail

          cat > ./run-grpc-bazel-build.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail

          max_attempts=3
          attempt=1
          while true; do
            if bazel build "$@" "$BAZEL_TARGET"; then
              break
            fi

            if [[ "$attempt" -ge "$max_attempts" ]]; then
              echo "Bazel build failed after ${max_attempts} attempts" >&2
              exit 1
            fi

            echo "Bazel build failed (attempt ${attempt}/${max_attempts}); retrying..." >&2
            attempt=$((attempt + 1))
            sleep 5
          done
          SH
          chmod +x ./run-grpc-bazel-build.sh

      - name: Start bazel-remote
        env:
          CONTAINER_NAME: bazel-remote-seed
        run: |
          set -euo pipefail
          mkdir -p bazel-remote-data
          docker run -d \
            --name "$CONTAINER_NAME" \
            -u "$(id -u):$(id -g)" \
            -v "$PWD/bazel-remote-data:/data" \
            -p 127.0.0.1:9090:8080 \
            "$BAZEL_REMOTE_IMAGE" \
            --dir /data \
            --max_size 20

          for _ in $(seq 1 60); do
            if curl -fsSL "$BAZEL_REMOTE_URL/status" >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          echo "bazel-remote did not become ready" >&2
          docker logs "$CONTAINER_NAME" || true
          exit 1

      - name: Configure Bazel remote cache
        run: |
          cat > ~/.bazelrc <<EOF
          build --remote_cache=${BAZEL_REMOTE_URL}
          build --remote_upload_local_results=true
          build --remote_cache_async=false
          build --remote_download_minimal
          build --jobs=256
          build --remote_max_connections=64
          build --experimental_remote_cache_eviction_retries=5
          EOF

      - name: Run cold + seed cache build
        id: cold_baseline_build
        run: |
          set -euo pipefail
          bazel clean --expunge

          start="$(date +%s)"
          ./run-grpc-bazel-build.sh
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Flush Bazel server state
        if: always()
        run: bazel shutdown || true

      - name: Collect bazel-remote diagnostics
        if: always()
        env:
          CONTAINER_NAME: bazel-remote-seed
        run: |
          set -euo pipefail
          .benchmark-config/scripts/collect-bazel-remote-diagnostics.sh \
            --output-dir "bazel-remote-diag-seed" \
            --phase "seed" \
            --cache-tag "seed" \
            --remote-url "$BAZEL_REMOTE_URL" \
            --container-name "$CONTAINER_NAME" \
            --cache-root "$HOME/.cache/bazel" \
            --cache-label "bazel-cache"

      - name: Stop bazel-remote
        if: always()
        env:
          CONTAINER_NAME: bazel-remote-seed
        run: |
          docker stop "$CONTAINER_NAME" >/dev/null 2>&1 || true
          docker rm "$CONTAINER_NAME" >/dev/null 2>&1 || true

      - name: Upload bazel-remote data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bazel-remote-data-${{ env.BENCHMARK_ID }}-seed
          path: bazel-remote-data
          if-no-files-found: error
          compression-level: 0

      - name: Upload bazel-remote diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bazel-remote-diag-${{ env.BENCHMARK_ID }}-seed-control
          path: bazel-remote-diag-seed
          if-no-files-found: warn

  warm1-build:
    name: Bazel Warm 1 (bazel-remote)
