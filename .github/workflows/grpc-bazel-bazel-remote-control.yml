          submodules: true

      - name: Checkout benchmark config
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          path: .benchmark-config

      - name: Download warm1 bazel-remote data
        uses: actions/download-artifact@v4
        with:
          name: bazel-remote-data-${{ env.BENCHMARK_ID }}-warm1
          path: .

      - name: Setup Bazelisk
