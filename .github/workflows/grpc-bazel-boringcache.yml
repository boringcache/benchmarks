name: "gRPC Bazel - BoringCache"

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/grpc-bazel-boringcache.yml"
      - ".github/workflows/grpc-bazel-actions-cache.yml"
      - "scripts/**"

permissions:
  contents: read
  actions: read

env:
  PROJECT_REPO: grpc/grpc
  PROJECT_REF: "93ab404fb2689edca91deb97f0dba449ac154379"
  BENCHMARK_ID: grpc-bazel
  BENCHMARK_WORKSPACE: boringcache/benchmarks
  BAZEL_TARGET: "//examples/cpp/csm:csm_greeter_client"

jobs:
  bazel-build:
    name: Bazel build (BoringCache, cold+warm)
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PROJECT_REPO }}
          ref: ${{ env.PROJECT_REF }}
          submodules: true

      - name: Checkout benchmark config
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          path: .benchmark-config

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Setup Bazel remote cache via BoringCache
        id: bazel_cache
        uses: boringcache/bazel-action@v1
        with:
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          cache-tag: grpc-bazel-remote-cache
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}

      - name: Prepare benchmark helpers
        id: scope
        run: |
          set -euo pipefail

          scope_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          tag_bazel="${BENCHMARK_ID}-remote-cache"
          tags_csv="${tag_bazel}"

          echo "scope_started_at=${scope_started_at}" >> "$GITHUB_OUTPUT"
          echo "tag_bazel=${tag_bazel}" >> "$GITHUB_OUTPUT"
          echo "tags_csv=${tags_csv}" >> "$GITHUB_OUTPUT"

          cat > ./run-grpc-bazel-build.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail

          max_attempts=2
          attempt=1
          while true; do
            if bazel build "$@" "$BAZEL_TARGET"; then
              break
            fi

            if [[ "$attempt" -ge "$max_attempts" ]]; then
              echo "Bazel build failed after ${max_attempts} attempts" >&2
              exit 1
            fi

            echo "Bazel build failed (attempt ${attempt}/${max_attempts}); retrying..." >&2
            attempt=$((attempt + 1))
            sleep 5
          done
          SH
          chmod +x ./run-grpc-bazel-build.sh

      - name: Purge BoringCache benchmark tags
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
        run: |
          set -euo pipefail
          boringcache delete --no-git "$BENCHMARK_WORKSPACE" "${{ steps.scope.outputs.tags_csv }}" || true

      - name: Run cold + seed cache build
        id: cold_baseline_build
        run: |
          set -euo pipefail
          bazel clean --expunge

          start="$(date +%s)"
          ./run-grpc-bazel-build.sh
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Clean Bazel for warm build 1
        run: bazel clean --expunge

      - name: Run warm build 1
        id: warm1_build
        run: |
          set -euo pipefail
          start="$(date +%s)"
          ./run-grpc-bazel-build.sh
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Clean Bazel for warm build 2
        run: bazel clean --expunge

      - name: Run warm build 2
        id: warm2_build
        run: |
          set -euo pipefail
          start="$(date +%s)"
          ./run-grpc-bazel-build.sh
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Clean Bazel for stale build
        run: bazel clean --expunge

      - name: Run stale build
        id: stale_docker_build
        run: |
          set -euo pipefail

          stale_file="examples/cpp/csm/csm_greeter_client.cc"
          if [[ ! -f "$stale_file" ]]; then
            stale_file=""
            while IFS= read -r candidate; do
              stale_file="${candidate}"
              break
            done < <(find examples -name '*.cc')
          fi
          if [[ -z "$stale_file" ]]; then
            echo "No C++ source file found for stale mutation" >&2
            exit 1
          fi
          echo "// benchmark stale mutation ${GITHUB_RUN_ID:-local}-$(date +%s)" >> "${stale_file}"
          echo "Applied stale change to ${stale_file}"

          start="$(date +%s)"
          ./run-grpc-bazel-build.sh
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Measure BoringCache storage usage
        id: cache_size
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
        run: |
          tags_csv="${{ steps.scope.outputs.tags_csv }}"
          bytes="$(.benchmark-config/scripts/sum-boringcache-check-sizes.sh "$BENCHMARK_WORKSPACE" "$tags_csv")"
          echo "bytes=${bytes}" >> "$GITHUB_OUTPUT"

      - name: Write benchmark artifacts
        id: artifact_files
        run: |
          .benchmark-config/scripts/write-benchmark-artifacts.sh \
            --benchmark "$BENCHMARK_ID" \
            --strategy "boringcache" \
            --project-repo "$PROJECT_REPO" \
            --project-ref "$PROJECT_REF" \
            --cold-seconds "${{ steps.cold_baseline_build.outputs.seconds }}" \
            --warm1-seconds "${{ steps.warm1_build.outputs.seconds }}" \
            --warm2-seconds "${{ steps.warm2_build.outputs.seconds }}" \
            --stale-docker-seconds "${{ steps.stale_docker_build.outputs.seconds }}" \
            --cache-storage-bytes "${{ steps.cache_size.outputs.bytes }}" \
            --cache-storage-source "boringcache-check" \
            --hit-behavior-note "Cold+seed run builds from empty state with remote cache enabled and records cold timing while priming the proxy-backed cache. boringcache/bazel-action starts cache-registry proxy and writes ~/.bazelrc with --remote_cache. bazel clean --expunge between warm/stale phases. Warm runs hit the proxy-backed remote cache for action cache + CAS. Stale run mutates one .cc source file before building with remote cache."

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ env.BENCHMARK_ID }}-boringcache
          path: |
            ${{ steps.artifact_files.outputs.json_path }}
            ${{ steps.artifact_files.outputs.md_path }}
          if-no-files-found: error

      - name: Publish summary
        run: cat "${{ steps.artifact_files.outputs.md_path }}" >> "$GITHUB_STEP_SUMMARY"
