name: "gRPC Bazel - BoringCache"

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/grpc-bazel-boringcache.yml"
      - ".github/workflows/grpc-bazel-actions-cache.yml"
      - "scripts/**"

permissions:
  contents: read
  actions: read

env:
  PROJECT_REPO: grpc/grpc
  PROJECT_REF: "ca0a0c39f90b0f64b1852cf712797abb0c1fd7ee"
  BENCHMARK_ID: grpc-bazel
  BENCHMARK_WORKSPACE: boringcache/benchmarks
  BAZEL_TARGET: "//examples/cpp/csm:csm_greeter_client"

jobs:
  bazel-build:
    name: Bazel build (BoringCache, cold+warm)
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PROJECT_REPO }}
          ref: ${{ env.PROJECT_REF }}
          submodules: true

      - name: Checkout benchmark config
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          path: .benchmark-config

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Setup BoringCache CLI
        uses: boringcache/setup-boringcache@v1
        with:
          token: ${{ secrets.BORINGCACHE_API_TOKEN }}
          version: v1.0.3
          platform: debian-bookworm-amd64
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}

      - name: Prepare benchmark scope and helpers
        id: scope
        run: |
          set -euo pipefail

          scope_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          tag_bazel="grpc-bazel"
          tags_csv="${tag_bazel}"

          echo "scope_started_at=${scope_started_at}" >> "$GITHUB_OUTPUT"
          echo "tag_bazel=${tag_bazel}" >> "$GITHUB_OUTPUT"
          echo "tags_csv=${tags_csv}" >> "$GITHUB_OUTPUT"

          proxy_port=5000
          proxy_log="$(mktemp /tmp/boringcache-proxy.XXXXXX.log)"
          echo "proxy_port=${proxy_port}" >> "$GITHUB_OUTPUT"
          echo "proxy_log=${proxy_log}" >> "$GITHUB_OUTPUT"

          cat > ./run-grpc-bazel-phase.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail

          mode="${1:-warm}"
          proxy_port="${PROXY_PORT:-5000}"
          proxy_log="${PROXY_LOG:-/tmp/boringcache-proxy.log}"
          proxy_pid=""

          start_proxy() {
            : > "$proxy_log"
            RUST_LOG=info boringcache cache-registry "$BENCHMARK_WORKSPACE" "$BORINGCACHE_TAG_BAZEL" \
              --host 127.0.0.1 --port "$proxy_port" --no-git --verbose > "$proxy_log" 2>&1 &
            proxy_pid=$!
          }

          stop_proxy() {
            if [[ -n "${proxy_pid:-}" ]] && kill -0 "$proxy_pid" >/dev/null 2>&1; then
              kill -INT "$proxy_pid" >/dev/null 2>&1 || true
              local i=0
              while kill -0 "$proxy_pid" >/dev/null 2>&1 && [[ $i -lt 120 ]]; do
                sleep 1
                i=$((i + 1))
              done
              if kill -0 "$proxy_pid" >/dev/null 2>&1; then
                kill -9 "$proxy_pid" >/dev/null 2>&1 || true
              fi
              wait "$proxy_pid" 2>/dev/null || true
            fi
            proxy_pid=""
          }

          wait_proxy_ready() {
            local ready=0
            for _ in $(seq 1 60); do
              code="$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:${proxy_port}/v2/" || true)"
              if [[ "$code" == "200" || "$code" == "401" ]]; then
                ready=1
                break
              fi
              sleep 1
            done
            [[ "$ready" -eq 1 ]]
          }

          cleanup() {
            stop_proxy
            echo "=== Proxy log (last 200 lines) ==="
            tail -n 200 "$proxy_log" 2>/dev/null || true
            echo "=== End proxy log ==="
          }
          trap cleanup EXIT

          apply_stale_change() {
            local stale_file="examples/cpp/csm/csm_greeter_client.cc"
            if [[ ! -f "$stale_file" ]]; then
              stale_file="$(find examples -name '*.cc' | head -n1)"
            fi
            if [[ -z "${stale_file}" ]]; then
              echo "No C++ source file found for stale mutation" >&2
              exit 1
            fi

            echo "// benchmark stale mutation ${GITHUB_RUN_ID:-local}-$(date +%s)" >> "${stale_file}"
            echo "Applied stale change to ${stale_file}"
          }

          run_bazel_build() {
            local cache_args=()
            local max_attempts=2
            local attempt=1
            if [[ "${1:-}" == "cached" ]]; then
              cache_args=(--remote_cache="http://127.0.0.1:${proxy_port}")
            fi

            while true; do
              if bazel build "${cache_args[@]}" "$BAZEL_TARGET"; then
                break
              fi

              if [[ "$attempt" -ge "$max_attempts" ]]; then
                echo "Bazel build failed after ${max_attempts} attempts" >&2
                return 1
              fi

              echo "Bazel build failed (attempt ${attempt}/${max_attempts}); retrying..." >&2
              attempt=$((attempt + 1))
              sleep 5
            done
          }

          case "$mode" in
            cold)
              run_bazel_build
              ;;
            seed)
              start_proxy
              if ! wait_proxy_ready; then
                echo "Registry proxy did not become ready" >&2
                tail -n 200 "$proxy_log" || true
                exit 1
              fi
              run_bazel_build cached
              stop_proxy
              ;;
            warm)
              start_proxy
              if ! wait_proxy_ready; then
                echo "Registry proxy did not become ready" >&2
                tail -n 200 "$proxy_log" || true
                exit 1
              fi
              run_bazel_build cached
              stop_proxy
              ;;
            stale)
              start_proxy
              if ! wait_proxy_ready; then
                echo "Registry proxy did not become ready" >&2
                tail -n 200 "$proxy_log" || true
                exit 1
              fi
              apply_stale_change
              run_bazel_build cached
              stop_proxy
              ;;
            *)
              echo "Unknown mode: $mode" >&2
              exit 1
              ;;
          esac
          SH
          chmod +x ./run-grpc-bazel-phase.sh

      - name: Purge BoringCache benchmark tags
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
        run: |
          set -euo pipefail
          boringcache delete --no-git "$BENCHMARK_WORKSPACE" "${{ steps.scope.outputs.tags_csv }}" || true

      - name: Run cold baseline build
        id: cold_baseline_build
        env:
          PROXY_PORT: ${{ steps.scope.outputs.proxy_port }}
          PROXY_LOG: ${{ steps.scope.outputs.proxy_log }}
          BORINGCACHE_TAG_BAZEL: ${{ steps.scope.outputs.tag_bazel }}
        run: |
          set -euo pipefail
          bazel clean --expunge

          start="$(date +%s)"
          ./run-grpc-bazel-phase.sh cold
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Clean Bazel for seed build
        run: bazel clean --expunge

      - name: Seed cache build
        id: seed_cache_build
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
          PROXY_PORT: ${{ steps.scope.outputs.proxy_port }}
          PROXY_LOG: ${{ steps.scope.outputs.proxy_log }}
          BORINGCACHE_TAG_BAZEL: ${{ steps.scope.outputs.tag_bazel }}
        run: |
          set -euo pipefail
          start="$(date +%s)"
          ./run-grpc-bazel-phase.sh seed
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Clean Bazel for warm build 1
        run: bazel clean --expunge

      - name: Run warm build 1
        id: warm1_build
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
          PROXY_PORT: ${{ steps.scope.outputs.proxy_port }}
          PROXY_LOG: ${{ steps.scope.outputs.proxy_log }}
          BORINGCACHE_TAG_BAZEL: ${{ steps.scope.outputs.tag_bazel }}
        run: |
          set -euo pipefail
          start="$(date +%s)"
          ./run-grpc-bazel-phase.sh warm
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Clean Bazel for warm build 2
        run: bazel clean --expunge

      - name: Run warm build 2
        id: warm2_build
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
          PROXY_PORT: ${{ steps.scope.outputs.proxy_port }}
          PROXY_LOG: ${{ steps.scope.outputs.proxy_log }}
          BORINGCACHE_TAG_BAZEL: ${{ steps.scope.outputs.tag_bazel }}
        run: |
          set -euo pipefail
          start="$(date +%s)"
          ./run-grpc-bazel-phase.sh warm
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Clean Bazel for stale build
        run: bazel clean --expunge

      - name: Run stale build
        id: stale_docker_build
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
          PROXY_PORT: ${{ steps.scope.outputs.proxy_port }}
          PROXY_LOG: ${{ steps.scope.outputs.proxy_log }}
          BORINGCACHE_TAG_BAZEL: ${{ steps.scope.outputs.tag_bazel }}
        run: |
          set -euo pipefail
          start="$(date +%s)"
          ./run-grpc-bazel-phase.sh stale
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Measure BoringCache storage usage
        id: cache_size
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
        run: |
          tags_csv="${{ steps.scope.outputs.tags_csv }}"
          bytes="$(.benchmark-config/scripts/sum-boringcache-check-sizes.sh "$BENCHMARK_WORKSPACE" "$tags_csv")"
          echo "bytes=${bytes}" >> "$GITHUB_OUTPUT"

      - name: Write benchmark artifacts
        id: artifact_files
        run: |
          .benchmark-config/scripts/write-benchmark-artifacts.sh \
            --benchmark "$BENCHMARK_ID" \
            --strategy "boringcache" \
            --project-repo "$PROJECT_REPO" \
            --project-ref "$PROJECT_REF" \
            --cold-seconds "${{ steps.cold_baseline_build.outputs.seconds }}" \
            --warm1-seconds "${{ steps.warm1_build.outputs.seconds }}" \
            --warm2-seconds "${{ steps.warm2_build.outputs.seconds }}" \
            --stale-docker-seconds "${{ steps.stale_docker_build.outputs.seconds }}" \
            --cache-storage-bytes "${{ steps.cache_size.outputs.bytes }}" \
            --cache-storage-source "boringcache-check" \
            --hit-behavior-note "Cold baseline builds without remote cache. Seed run starts boringcache cache-registry as native Bazel HTTP remote cache, builds target, and flushes cache via SIGINT. bazel clean --expunge between every phase. Warm runs use proxy-backed remote cache for action cache + CAS hits. Stale run mutates one .cc source file before building with remote cache."

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ env.BENCHMARK_ID }}-boringcache
          path: |
            ${{ steps.artifact_files.outputs.json_path }}
            ${{ steps.artifact_files.outputs.md_path }}
          if-no-files-found: error

      - name: Publish summary
        run: cat "${{ steps.artifact_files.outputs.md_path }}" >> "$GITHUB_STEP_SUMMARY"
