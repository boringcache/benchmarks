name: "Reusable Gradle Benchmark"

on:
  workflow_call:
    inputs:
      benchmark_id:
        required: true
        type: string
      project_repo:
        required: true
        type: string
      project_ref:
        required: true
        type: string
      strategy:
        required: true
        type: string
      benchmark_workspace:
        required: false
        type: string
        default: boringcache/benchmarks
      java_version:
        required: false
        type: string
        default: "21"
      build_command:
        required: false
        type: string
        default: ./gradlew --no-daemon build -x test -Porg.gradle.java.installations.auto-download=false

env:
  PROJECT_REPO: ${{ inputs.project_repo }}
  PROJECT_REF: ${{ inputs.project_ref }}
  BENCHMARK_ID: ${{ inputs.benchmark_id }}
  BENCHMARK_WORKSPACE: ${{ inputs.benchmark_workspace }}
  JAVA_VERSION: ${{ inputs.java_version }}
  BUILD_COMMAND: ${{ inputs.build_command }}
  PROXY_PORT: "5000"

jobs:
  seed-cache:
    name: Gradle Seed (${{ inputs.strategy }}, cold)
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      cold_seconds: ${{ steps.cold_baseline_build.outputs.seconds }}
      scope_started_at: ${{ steps.scope.outputs.scope_started_at }}
      tags_csv: ${{ steps.scope.outputs.tags_csv }}
      seed_cache_key: ${{ steps.seed_cache_key.outputs.key }}
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PROJECT_REPO }}
          ref: ${{ env.PROJECT_REF }}

      - name: Checkout benchmark config
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          path: .benchmark-config

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Prepare benchmark scope and helpers
        id: scope
        run: |
          set -euo pipefail

          scope_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cache_scope="${BENCHMARK_ID}-run-r${GITHUB_RUN_ID}-a${GITHUB_RUN_ATTEMPT}"
          tag_remote="${cache_scope}-gradle-remote"
          tag_home="${cache_scope}-gradle-home"
          tags_csv="${tag_remote},${tag_home}"
          cache_key_primary="ac-${cache_scope}-seed1"
          cache_key_fallback="ac-${cache_scope}-seed2"

          echo "scope_started_at=${scope_started_at}" >> "$GITHUB_OUTPUT"
          echo "tag_remote=${tag_remote}" >> "$GITHUB_OUTPUT"
          echo "tag_home=${tag_home}" >> "$GITHUB_OUTPUT"
          echo "tags_csv=${tags_csv}" >> "$GITHUB_OUTPUT"
          echo "cache_key_primary=${cache_key_primary}" >> "$GITHUB_OUTPUT"
          echo "cache_key_fallback=${cache_key_fallback}" >> "$GITHUB_OUTPUT"

          cat > ./run-gradle-phase.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail

          mode="${1:-warm}"
          configure_local_cache_only() {
            mkdir -p "${GRADLE_USER_HOME}/init.d"
            cat > "${GRADLE_USER_HOME}/init.d/boringcache-cache.gradle" <<EOF
          gradle.settingsEvaluated { settings ->
              settings.buildCache {
                  local {
                      enabled = true
                  }
                  remote(HttpBuildCache) {
                      enabled = false
                  }
              }
          }
          EOF
          }

          enable_gradle_cache() {
            mkdir -p "${GRADLE_USER_HOME}"
            {
              echo "org.gradle.caching=true"
              echo "org.gradle.daemon=false"
            } >> "${GRADLE_USER_HOME}/gradle.properties"
          }

          apply_stale_change() {
            local stale_file=""
            local candidates=()
            mapfile -t candidates < <(git ls-files -- '*.java')
            stale_file="${candidates[0]:-}"

            if [[ -z "${stale_file}" ]]; then
              echo "No Java source file found for stale mutation" >&2
              exit 1
            fi

            echo "// benchmark stale mutation ${GITHUB_RUN_ID:-local}-$(date +%s)" >> "${stale_file}"
            echo "Applied stale change to ${stale_file}"
          }

          if [[ "${USE_REMOTE_CACHE:-0}" != "1" ]]; then
            configure_local_cache_only
            enable_gradle_cache
          fi

          if [[ "$mode" == "stale" ]]; then
            apply_stale_change
          fi

          eval "$BUILD_COMMAND"
          SH
          chmod +x ./run-gradle-phase.sh

      - name: Setup BoringCache Gradle remote cache
        if: inputs.strategy == 'boringcache'
        uses: boringcache/gradle-action@v1
        with:
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          cache-tag: ${{ steps.scope.outputs.tag_remote }}
          gradle-home: ${{ github.workspace }}/.gradle-user-home
          proxy-no-git: 'true'
          proxy-no-platform: 'true'
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
          RUST_LOG: info
          BORINGCACHE_OBSERVABILITY_INCLUDE_CACHE_OPS: "1"

      - name: Purge benchmark GHA cache keys
        if: inputs.strategy == 'actions-cache'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for key_prefix in "${{ steps.scope.outputs.cache_key_primary }}" "${{ steps.scope.outputs.cache_key_fallback }}"; do
            page=1
            while true; do
              response="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/caches?per_page=100&page=${page}&key=${key_prefix}" 2>/dev/null || true)"
              if [[ -z "$response" ]] || ! jq -e '.actions_caches | type == "array"' <<<"$response" >/dev/null 2>&1; then
                break
              fi
              mapfile -t cache_ids < <(jq -r '.actions_caches[].id' <<<"$response")
              for cache_id in "${cache_ids[@]}"; do
                gh api -X DELETE "/repos/${GITHUB_REPOSITORY}/actions/caches/${cache_id}" >/dev/null 2>&1 || true
              done
              count="$(jq '.actions_caches | length' <<<"$response")"
              if [[ "$count" -lt 100 ]]; then
                break
              fi
              page=$((page + 1))
            done
          done

      - name: Prepare AC write probe
        if: inputs.strategy == 'actions-cache'
        run: |
          set -euo pipefail
          mkdir -p .bench-cache-probe
          printf '%s\n' "probe-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-$(date +%s)" > .bench-cache-probe/probe.txt

      - name: Verify Actions Cache write access
        if: inputs.strategy == 'actions-cache'
        id: cache_write_probe
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            .bench-cache-probe
          key: ac-${{ env.BENCHMARK_ID }}-write-probe-r${{ github.run_id }}-a${{ github.run_attempt }}

      - name: Fail early if Actions Cache is read-only
        if: inputs.strategy == 'actions-cache' && steps.cache_write_probe.outcome != 'success'
        run: |
          echo "Actions Cache write probe failed (likely read-only budget/spending cap)." >&2
          echo "Cannot produce reliable AC benchmark results until cache writes are enabled." >&2
          exit 1

      - name: Run cold + seed cache build
        id: cold_baseline_build
        env:
          GRADLE_USER_HOME: ${{ github.workspace }}/.gradle-user-home
          USE_REMOTE_CACHE: ${{ inputs.strategy == 'boringcache' && '1' || '0' }}
        run: |
          set -euo pipefail
          if [[ "${{ inputs.strategy }}" == "actions-cache" ]]; then
            rm -rf "$GRADLE_USER_HOME"
            mkdir -p "$GRADLE_USER_HOME"
          else
            mkdir -p "$GRADLE_USER_HOME"
          fi

          start="$(date +%s)"
          ./run-gradle-phase.sh seed
          rm -rf "$GRADLE_USER_HOME/daemon" "$GRADLE_USER_HOME/notifications"
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Verify seed cache entries exist
        if: inputs.strategy == 'boringcache'
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.scope.outputs.tag_remote }}"
          echo "Verifying seed cache entries for tag: ${tag}"
          if boringcache check --no-git "${BENCHMARK_WORKSPACE}" "${tag}"; then
            echo "Seed cache entries confirmed visible in backend"
          else
            echo "WARNING: Seed cache entries NOT found - flush may not have completed before proxy shutdown" >&2
          fi

      - name: Strip local Gradle build-cache directories before archive save
        if: inputs.strategy == 'boringcache'
        env:
          GRADLE_USER_HOME: ${{ github.workspace }}/.gradle-user-home
        run: |
          set -euo pipefail
          find "$GRADLE_USER_HOME/caches" -maxdepth 1 -mindepth 1 -type d -name 'build-cache-*' -exec rm -rf {} + 2>/dev/null || true

      - name: Save BoringCache Gradle user home
        if: inputs.strategy == 'boringcache'
        uses: boringcache/save@v1
        with:
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          entries: ${{ steps.scope.outputs.tag_home }}:${{ github.workspace }}/.gradle-user-home
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}

      - name: Save seeded cache (primary key)
        if: inputs.strategy == 'actions-cache'
        id: save_seed_primary
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ github.workspace }}/.gradle-user-home
          key: ${{ steps.scope.outputs.cache_key_primary }}

      - name: Save seeded cache (fallback key)
        if: inputs.strategy == 'actions-cache' && steps.save_seed_primary.outcome != 'success'
        id: save_seed_fallback
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ github.workspace }}/.gradle-user-home
          key: ${{ steps.scope.outputs.cache_key_fallback }}

      - name: Resolve seeded cache key
        if: inputs.strategy == 'actions-cache'
        id: seed_cache_key
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          primary="${{ steps.scope.outputs.cache_key_primary }}"
          fallback="${{ steps.scope.outputs.cache_key_fallback }}"
          key=""

          for candidate in "$primary" "$fallback"; do
            for _ in $(seq 1 30); do
              response="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/caches?per_page=100&key=${candidate}" 2>/dev/null || true)"
              if [[ -n "$response" ]] && jq -e '.actions_caches | type == "array"' <<<"$response" >/dev/null 2>&1; then
                matches="$(jq '.actions_caches | length' <<<"$response")"
                if [[ "$matches" -gt 0 ]]; then
                  key="$candidate"
                  break 2
                fi
              fi
              sleep 2
            done
          done

          if [[ -z "$key" ]]; then
            echo "Failed to verify seeded cache key in GHA cache API (likely cache save/read-only budget issue)." >&2
            echo "Primary save outcome: ${{ steps.save_seed_primary.outcome }}" >&2
            echo "Fallback save outcome: ${{ steps.save_seed_fallback.outcome }}" >&2
            exit 1
          fi

          echo "key=${key}" >> "$GITHUB_OUTPUT"
          echo "Using seeded cache key: ${key}"

  scenario-builds:
    name: Gradle Scenario (${{ matrix.phase }}) (${{ inputs.strategy }})
    needs: seed-cache
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        phase: [warm1, warm2, stale]
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PROJECT_REPO }}
          ref: ${{ env.PROJECT_REF }}

      - name: Checkout benchmark config
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          path: .benchmark-config

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Prepare benchmark scope and helpers
        id: scope
        run: |
          set -euo pipefail

          cache_scope="${BENCHMARK_ID}-run-r${GITHUB_RUN_ID}-a${GITHUB_RUN_ATTEMPT}"
          tag_remote="${cache_scope}-gradle-remote"
          tag_home="${cache_scope}-gradle-home"

          echo "tag_remote=${tag_remote}" >> "$GITHUB_OUTPUT"
          echo "tag_home=${tag_home}" >> "$GITHUB_OUTPUT"

          cat > ./run-gradle-phase.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail

          mode="${1:-warm}"
          configure_local_cache_only() {
            mkdir -p "${GRADLE_USER_HOME}/init.d"
            cat > "${GRADLE_USER_HOME}/init.d/boringcache-cache.gradle" <<EOF
          gradle.settingsEvaluated { settings ->
              settings.buildCache {
                  local {
                      enabled = true
                  }
                  remote(HttpBuildCache) {
                      enabled = false
                  }
              }
          }
          EOF
          }

          enable_gradle_cache() {
            mkdir -p "${GRADLE_USER_HOME}"
            {
              echo "org.gradle.caching=true"
              echo "org.gradle.daemon=false"
            } >> "${GRADLE_USER_HOME}/gradle.properties"
          }

          apply_stale_change() {
            local stale_file=""
            local candidates=()
            mapfile -t candidates < <(git ls-files -- '*.java')
            stale_file="${candidates[0]:-}"

            if [[ -z "${stale_file}" ]]; then
              echo "No Java source file found for stale mutation" >&2
              exit 1
            fi

            echo "// benchmark stale mutation ${GITHUB_RUN_ID:-local}-$(date +%s)" >> "${stale_file}"
            echo "Applied stale change to ${stale_file}"
          }

          if [[ "${USE_REMOTE_CACHE:-0}" != "1" ]]; then
            configure_local_cache_only
            enable_gradle_cache
          fi

          if [[ "$mode" == "stale" ]]; then
            apply_stale_change
          fi

          eval "$BUILD_COMMAND"
          SH
          chmod +x ./run-gradle-phase.sh

      - name: Restore BoringCache Gradle user home
        if: inputs.strategy == 'boringcache'
        uses: boringcache/restore@v1
        with:
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          entries: ${{ steps.scope.outputs.tag_home }}:${{ github.workspace }}/.gradle-user-home
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}

      - name: Setup BoringCache Gradle remote cache
        if: inputs.strategy == 'boringcache'
        uses: boringcache/gradle-action@v1
        with:
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          cache-tag: ${{ steps.scope.outputs.tag_remote }}
          gradle-home: ${{ github.workspace }}/.gradle-user-home
          proxy-no-git: 'true'
          proxy-no-platform: 'true'
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
          RUST_LOG: info
          BORINGCACHE_OBSERVABILITY_INCLUDE_CACHE_OPS: "1"
          BORINGCACHE_CACHE_PREFETCH_BATCH_MAX: "10000"
          BORINGCACHE_CACHE_PREFETCH_MAX_BLOB_BYTES: "104857600"
          BORINGCACHE_BLOB_PREFETCH_MAX_INFLIGHT_BYTES: "2147483648"

      - name: Restore seeded actions/cache
        if: inputs.strategy == 'actions-cache'
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ github.workspace }}/.gradle-user-home
          key: ${{ needs.seed-cache.outputs.seed_cache_key }}
          fail-on-cache-miss: true

      - name: Run scenario build
        id: phase_build
        env:
          GRADLE_USER_HOME: ${{ github.workspace }}/.gradle-user-home
          USE_REMOTE_CACHE: ${{ inputs.strategy == 'boringcache' && '1' || '0' }}
        run: |
          set -euo pipefail
          start="$(date +%s)"
          ./run-gradle-phase.sh ${{ matrix.phase == 'stale' && 'stale' || 'warm' }}
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Persist scenario timing artifact
        run: |
          set -euo pipefail
          mkdir -p benchmark-phase
          cat > "benchmark-phase/${{ matrix.phase }}.env" <<EOF
          phase=${{ matrix.phase }}
          seconds=${{ steps.phase_build.outputs.seconds }}
          EOF

      - name: Upload scenario timing artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-phase-${{ env.BENCHMARK_ID }}-${{ inputs.strategy }}-${{ matrix.phase }}
          path: benchmark-phase/${{ matrix.phase }}.env
          if-no-files-found: error

  finalize-benchmark:
    name: Finalize benchmark artifacts
    needs: [seed-cache, scenario-builds]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout benchmark config
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          path: .benchmark-config

      - name: Setup BoringCache CLI
        if: inputs.strategy == 'boringcache'
        uses: boringcache/setup-boringcache@v1
        with:
          token: ${{ secrets.BORINGCACHE_API_TOKEN }}

      - name: Download scenario timing artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: benchmark-phase-${{ env.BENCHMARK_ID }}-${{ inputs.strategy }}-*
          path: benchmark-phase
          merge-multiple: true

      - name: Collect scenario timings
        id: timings
        run: |
          set -euo pipefail
          parse_phase() {
            local phase="$1"
            local file="benchmark-phase/${phase}.env"
            if [[ ! -f "$file" ]]; then
              echo "Missing timing artifact for phase ${phase}" >&2
              ls -R benchmark-phase || true
              exit 1
            fi
            local seconds
            seconds="$(grep "^seconds=" "$file" | head -n1 | cut -d= -f2-)"
            if [[ -z "${seconds}" ]]; then
              echo "Timing artifact for phase ${phase} has empty seconds" >&2
              cat "$file" >&2
              exit 1
            fi
            echo "${phase}_seconds=${seconds}" >> "$GITHUB_OUTPUT"
          }
          parse_phase warm1
          parse_phase warm2
          parse_phase stale

      - name: Measure BoringCache storage usage
        if: inputs.strategy == 'boringcache'
        id: bc_cache_size
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
        run: |
          tags_csv="${{ needs.seed-cache.outputs.tags_csv }}"
          bytes="$(.benchmark-config/scripts/sum-boringcache-check-sizes.sh "$BENCHMARK_WORKSPACE" "$tags_csv")"
          echo "bytes=${bytes}" >> "$GITHUB_OUTPUT"

      - name: Measure GHA cache storage usage
        if: inputs.strategy == 'actions-cache'
        id: ac_cache_size
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bytes="$(.benchmark-config/scripts/sum-gha-cache-by-key.sh "${{ needs.seed-cache.outputs.seed_cache_key }}" "${{ needs.seed-cache.outputs.scope_started_at }}")"
          echo "bytes=${bytes}" >> "$GITHUB_OUTPUT"

      - name: Write benchmark artifacts
        id: artifact_files
        run: |
          .benchmark-config/scripts/write-benchmark-artifacts.sh \
            --benchmark "$BENCHMARK_ID" \
            --strategy "${{ inputs.strategy }}" \
            --project-repo "$PROJECT_REPO" \
            --project-ref "$PROJECT_REF" \
            --cold-seconds "${{ needs.seed-cache.outputs.cold_seconds }}" \
            --warm1-seconds "${{ steps.timings.outputs.warm1_seconds }}" \
            --warm2-seconds "${{ steps.timings.outputs.warm2_seconds }}" \
            --stale-docker-seconds "${{ steps.timings.outputs.stale_seconds }}" \
            --cache-storage-bytes "${{ inputs.strategy == 'boringcache' && steps.bc_cache_size.outputs.bytes || steps.ac_cache_size.outputs.bytes }}" \
            --cache-storage-source "${{ inputs.strategy == 'boringcache' && 'boringcache-check' || 'github-actions-cache-api' }}" \
            --hit-behavior-note "${{ inputs.strategy == 'boringcache' && 'Cold+seed run uses boringcache/gradle-action to seed an empty run-scoped Gradle HTTP remote cache and then archives a sanitized Gradle user home via boringcache/save with local build-cache directories stripped. Warm1/Warm2 restore only that archived Gradle user home through boringcache/restore and then rely on the native remote build-cache protocol on fresh runners. Stale run restores dependency state, mutates one Java source file, then rebuilds against the same run-scoped remote cache.' || 'Cold+seed run builds from scratch with Gradle local build cache enabled and saves the entire Gradle user home, including local build-cache state, to actions/cache under a run-scoped key. Warm1/Warm2 and stale restore that same Gradle user home on fresh runners. Stale run mutates one Java source file before rebuilding against the restored local Gradle build cache.' }}"

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ env.BENCHMARK_ID }}-${{ inputs.strategy }}
          path: |
            ${{ steps.artifact_files.outputs.json_path }}
            ${{ steps.artifact_files.outputs.md_path }}
          if-no-files-found: error

      - name: Publish summary
        run: cat "${{ steps.artifact_files.outputs.md_path }}" >> "$GITHUB_STEP_SUMMARY"
