name: "Zed sccache - Actions Cache"

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/zed-sccache-boringcache.yml"
      - ".github/workflows/zed-sccache-actions-cache.yml"
      - "scripts/**"

permissions:
  contents: read
  actions: write

env:
  PROJECT_REPO: zed-industries/zed
  PROJECT_REF: "ca0fffb927b9bd94b884b7180f3d8779c3583a98"
  BENCHMARK_ID: zed-sccache
  BENCHMARK_WORKSPACE: boringcache/benchmarks

jobs:
  seed-cache:
    name: sccache Seed (actions/cache, cold)
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      seed_cache_key: ${{ steps.seed_cache_key.outputs.key }}
      cold_seconds: ${{ steps.cold_baseline_build.outputs.seconds }}
      scope_started_at: ${{ steps.scope.outputs.scope_started_at }}
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PROJECT_REPO }}
          ref: ${{ env.PROJECT_REF }}

      - name: Checkout benchmark config
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          path: .benchmark-config

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libvulkan-dev \
            libasound2-dev libfontconfig1-dev libfreetype6-dev \
            libssl-dev pkg-config cmake \
            libx11-dev libx11-xcb-dev libxcb1-dev \
            libxcursor-dev libxinerama-dev libxi-dev libxrandr-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install sccache
        run: |
          set -euo pipefail
          SCCACHE_VERSION="0.13.0"
          ARCHIVE="sccache-v${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          URL="https://github.com/mozilla/sccache/releases/download/v${SCCACHE_VERSION}/${ARCHIVE}"
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT
          curl -sS --fail --location --output "${TMP_DIR}/${ARCHIVE}" "$URL"
          tar -xzf "${TMP_DIR}/${ARCHIVE}" -C "$TMP_DIR"
          sudo install -m 0755 "${TMP_DIR}/sccache-v${SCCACHE_VERSION}-x86_64-unknown-linux-musl/sccache" /usr/local/bin/sccache
          sccache --version

      - name: Prepare benchmark scope and helpers
        id: scope
        run: |
          set -euo pipefail
          cache_scope="${BENCHMARK_ID}-run-r${GITHUB_RUN_ID}-a${GITHUB_RUN_ATTEMPT}"
          cache_key_primary="ac-${cache_scope}-seed1"
          cache_key_fallback="ac-${cache_scope}-seed2"
          scope_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "cache_scope=${cache_scope}" >> "$GITHUB_OUTPUT"
          echo "cache_key_primary=${cache_key_primary}" >> "$GITHUB_OUTPUT"
          echo "cache_key_fallback=${cache_key_fallback}" >> "$GITHUB_OUTPUT"
          echo "scope_started_at=${scope_started_at}" >> "$GITHUB_OUTPUT"

          cat > ./run-zed-sccache-phase.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail

          mode="${1:-warm}"

          run_cold_build() {
            cargo build --release
          }

          run_cached_build() {
            export SCCACHE_DIR="${HOME}/.cache/sccache"
            export SCCACHE_CACHE_SIZE="10G"
            export SCCACHE_IDLE_TIMEOUT="0"
            export RUSTC_WRAPPER="sccache"
            export CC="sccache cc"
            export CXX="sccache c++"

            sccache --start-server || true
            cargo build --release
            sccache --show-stats || true
            # Flush in-memory stats/artifacts so cache save captures stable state.
            sccache --stop-server || true
          }

          apply_stale_change() {
            local stale_file
            stale_file=""
            while IFS= read -r candidate; do
              stale_file="${candidate}"
              break
            done < <(git ls-files -- '*.rs')
            if [[ -z "${stale_file}" ]]; then
              echo "No Rust source file found for stale mutation" >&2
              exit 1
            fi

            echo "// benchmark stale mutation ${GITHUB_RUN_ID:-local}-$(date +%s)" >> "${stale_file}"
            echo "Applied stale change to ${stale_file}"
          }

          case "$mode" in
            cold)
              run_cold_build
              ;;
            warm)
              run_cached_build
              ;;
            stale)
              apply_stale_change
              run_cached_build
              ;;
            *)
              echo "Unknown mode: $mode" >&2
              exit 1
              ;;
          esac
          SH
          chmod +x ./run-zed-sccache-phase.sh

      - name: Purge benchmark GHA cache keys
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for key_prefix in "${{ steps.scope.outputs.cache_key_primary }}" "${{ steps.scope.outputs.cache_key_fallback }}"; do
            page=1
            while true; do
              response="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/caches?per_page=100&page=${page}&key=${key_prefix}" 2>/dev/null || true)"
              if [[ -z "$response" ]] || ! jq -e '.actions_caches | type == "array"' <<<"$response" >/dev/null 2>&1; then
                break
              fi
              mapfile -t cache_ids < <(jq -r '.actions_caches[].id' <<<"$response")
              for cache_id in "${cache_ids[@]}"; do
                gh api -X DELETE "/repos/${GITHUB_REPOSITORY}/actions/caches/${cache_id}" >/dev/null 2>&1 || true
              done
              count="$(jq '.actions_caches | length' <<<"$response")"
              if [[ "$count" -lt 100 ]]; then
                break
              fi
              page=$((page + 1))
            done
          done

      - name: Prepare AC write probe
        run: |
          set -euo pipefail
          mkdir -p .bench-cache-probe
          printf '%s\n' "probe-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-$(date +%s)" > .bench-cache-probe/probe.txt

      - name: Verify Actions Cache write access
        id: cache_write_probe
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            .bench-cache-probe
          key: ac-${{ env.BENCHMARK_ID }}-write-probe-r${{ github.run_id }}-a${{ github.run_attempt }}

      - name: Fail early if Actions Cache is read-only
        if: steps.cache_write_probe.outcome != 'success'
        run: |
          echo "Actions Cache write probe failed (likely read-only budget/spending cap)." >&2
          echo "Cannot produce reliable AC benchmark results until cache writes are enabled." >&2
          exit 1

      - name: Run cold + seed cache build
        id: cold_baseline_build
        run: |
          set -euo pipefail
          rm -rf target "$HOME/.cargo/registry" "$HOME/.cargo/git" "$HOME/.cache/sccache"
          mkdir -p target "$HOME/.cargo/registry" "$HOME/.cargo/git" "$HOME/.cache/sccache"

          start="$(date +%s)"
          ./run-zed-sccache-phase.sh warm
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Save seeded cache (primary key)
        id: save_seed_primary
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cache/sccache
            target
          key: ${{ steps.scope.outputs.cache_key_primary }}

      - name: Save seeded cache (fallback key)
        id: save_seed_fallback
        if: steps.save_seed_primary.outcome != 'success'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cache/sccache
            target
          key: ${{ steps.scope.outputs.cache_key_fallback }}

      - name: Resolve seeded cache key
        id: seed_cache_key
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          primary="${{ steps.scope.outputs.cache_key_primary }}"
          fallback="${{ steps.scope.outputs.cache_key_fallback }}"
          key=""

          for candidate in "$primary" "$fallback"; do
            for _ in $(seq 1 30); do
              response="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/caches?per_page=100&key=${candidate}" 2>/dev/null || true)"
              if [[ -n "$response" ]] && jq -e '.actions_caches | type == "array"' <<<"$response" >/dev/null 2>&1; then
                matches="$(jq '.actions_caches | length' <<<"$response")"
                if [[ "$matches" -gt 0 ]]; then
                  key="$candidate"
                  break 2
                fi
              fi
              sleep 2
            done
          done

          if [[ -z "$key" ]]; then
            echo "Failed to verify seeded cache key in GHA cache API (likely cache save/read-only budget issue)." >&2
            echo "Primary save outcome: ${{ steps.save_seed_primary.outcome }}" >&2
            echo "Fallback save outcome: ${{ steps.save_seed_fallback.outcome }}" >&2
            exit 1
          fi

          echo "key=${key}" >> "$GITHUB_OUTPUT"
          echo "Using seeded cache key: ${key}"


  scenario-builds:
    name: sccache Scenario (${{ matrix.phase }}) (actions/cache)
    needs: seed-cache
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        phase: [warm1, warm2, stale]
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PROJECT_REPO }}
          ref: ${{ env.PROJECT_REF }}

      - name: Checkout benchmark config
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          path: .benchmark-config

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libvulkan-dev \
            libasound2-dev libfontconfig1-dev libfreetype6-dev \
            libssl-dev pkg-config cmake \
            libx11-dev libx11-xcb-dev libxcb1-dev \
            libxcursor-dev libxinerama-dev libxi-dev libxrandr-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install sccache
        run: |
          set -euo pipefail
          SCCACHE_VERSION="0.13.0"
          ARCHIVE="sccache-v${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          URL="https://github.com/mozilla/sccache/releases/download/v${SCCACHE_VERSION}/${ARCHIVE}"
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT
          curl -sS --fail --location --output "${TMP_DIR}/${ARCHIVE}" "$URL"
          tar -xzf "${TMP_DIR}/${ARCHIVE}" -C "$TMP_DIR"
          sudo install -m 0755 "${TMP_DIR}/sccache-v${SCCACHE_VERSION}-x86_64-unknown-linux-musl/sccache" /usr/local/bin/sccache
          sccache --version

      - name: Prepare benchmark scope and helpers
        id: scope
        run: |
          set -euo pipefail
          cache_scope="${BENCHMARK_ID}-run-r${GITHUB_RUN_ID}-a${GITHUB_RUN_ATTEMPT}"
          cache_key_primary="ac-${cache_scope}-seed1"
          cache_key_fallback="ac-${cache_scope}-seed2"
          scope_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "cache_scope=${cache_scope}" >> "$GITHUB_OUTPUT"
          echo "cache_key_primary=${cache_key_primary}" >> "$GITHUB_OUTPUT"
          echo "cache_key_fallback=${cache_key_fallback}" >> "$GITHUB_OUTPUT"
          echo "scope_started_at=${scope_started_at}" >> "$GITHUB_OUTPUT"

          cat > ./run-zed-sccache-phase.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail

          mode="${1:-warm}"

          run_cold_build() {
            cargo build --release
          }

          run_cached_build() {
            export SCCACHE_DIR="${HOME}/.cache/sccache"
            export SCCACHE_CACHE_SIZE="10G"
            export SCCACHE_IDLE_TIMEOUT="0"
            export RUSTC_WRAPPER="sccache"
            export CC="sccache cc"
            export CXX="sccache c++"

            sccache --start-server || true
            cargo build --release
            sccache --show-stats || true
            # Flush in-memory stats/artifacts so cache save captures stable state.
            sccache --stop-server || true
          }

          apply_stale_change() {
            local stale_file
            stale_file=""
            while IFS= read -r candidate; do
              stale_file="${candidate}"
              break
            done < <(git ls-files -- '*.rs')
            if [[ -z "${stale_file}" ]]; then
              echo "No Rust source file found for stale mutation" >&2
              exit 1
            fi

            echo "// benchmark stale mutation ${GITHUB_RUN_ID:-local}-$(date +%s)" >> "${stale_file}"
            echo "Applied stale change to ${stale_file}"
          }

          case "$mode" in
            cold)
              run_cold_build
              ;;
            warm)
              run_cached_build
              ;;
            stale)
              apply_stale_change
              run_cached_build
              ;;
            *)
              echo "Unknown mode: $mode" >&2
              exit 1
              ;;
          esac
          SH
          chmod +x ./run-zed-sccache-phase.sh

      - name: Reset build state for warm build 1
        if: matrix.phase == 'warm1'
        run: |
          set -euo pipefail
          rm -rf target "$HOME/.cargo/registry" "$HOME/.cargo/git" "$HOME/.cache/sccache"
          mkdir -p target "$HOME/.cargo/registry" "$HOME/.cargo/git" "$HOME/.cache/sccache"

      - name: Restore cache for warm build 1
        if: matrix.phase == 'warm1'
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cache/sccache
            target
          key: ${{ needs.seed-cache.outputs.seed_cache_key }}
          fail-on-cache-miss: true

      - name: Run warm build 1
        id: warm1_build
        if: matrix.phase == 'warm1'
        run: |
          set -euo pipefail
          start="$(date +%s)"
          ./run-zed-sccache-phase.sh warm
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Reset build state for warm build 2
        if: matrix.phase == 'warm2'
        run: |
          set -euo pipefail
          rm -rf target "$HOME/.cargo/registry" "$HOME/.cargo/git" "$HOME/.cache/sccache"
          mkdir -p target "$HOME/.cargo/registry" "$HOME/.cargo/git" "$HOME/.cache/sccache"

      - name: Restore cache for warm build 2
        if: matrix.phase == 'warm2'
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cache/sccache
            target
          key: ${{ needs.seed-cache.outputs.seed_cache_key }}
          fail-on-cache-miss: true

      - name: Run warm build 2
        id: warm2_build
        if: matrix.phase == 'warm2'
        run: |
          set -euo pipefail
          start="$(date +%s)"
          ./run-zed-sccache-phase.sh warm
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Reset build state for stale build
        if: matrix.phase == 'stale'
        run: |
          set -euo pipefail
          rm -rf target "$HOME/.cargo/registry" "$HOME/.cargo/git" "$HOME/.cache/sccache"
          mkdir -p target "$HOME/.cargo/registry" "$HOME/.cargo/git" "$HOME/.cache/sccache"

      - name: Restore cache for stale build
        if: matrix.phase == 'stale'
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cache/sccache
            target
          key: ${{ needs.seed-cache.outputs.seed_cache_key }}
          fail-on-cache-miss: true

      - name: Run stale build
        id: stale_docker_build
        if: matrix.phase == 'stale'
        run: |
          set -euo pipefail
          start="$(date +%s)"
          ./run-zed-sccache-phase.sh stale
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Capture scenario timing
        id: phase_timing
        run: |
          set -euo pipefail
          seconds=""
          case "${{ matrix.phase }}" in
            warm1)
              seconds="${{ steps.warm1_build.outputs.seconds }}"
              ;;
            warm2)
              seconds="${{ steps.warm2_build.outputs.seconds }}"
              ;;
            stale)
              seconds="${{ steps.stale_docker_build.outputs.seconds }}"
              ;;
            *)
              echo "Unknown phase: ${{ matrix.phase }}" >&2
              exit 1
              ;;
          esac
          if [[ -z "${seconds}" ]]; then
            echo "No timing captured for phase ${{ matrix.phase }}" >&2
            exit 1
          fi
          echo "seconds=${seconds}" >> "$GITHUB_OUTPUT"
      - name: Persist scenario timing artifact
        run: |
          set -euo pipefail
          mkdir -p benchmark-phase
          cat > "benchmark-phase/${{ matrix.phase }}.env" <<EOF
          phase=${{ matrix.phase }}
          seconds=${{ steps.phase_timing.outputs.seconds }}
          EOF
      - name: Upload scenario timing artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-phase-${{ env.BENCHMARK_ID }}-actions-cache-${{ matrix.phase }}
          path: benchmark-phase/${{ matrix.phase }}.env
          if-no-files-found: error

  finalize-benchmark:
    name: Finalize benchmark artifacts
    needs: [seed-cache, scenario-builds]
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Checkout benchmark config
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          path: .benchmark-config

      - name: Download scenario timing artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: benchmark-phase-${{ env.BENCHMARK_ID }}-actions-cache-*
          path: benchmark-phase
          merge-multiple: true
      - name: Collect scenario timings
        id: timings
        run: |
          set -euo pipefail
          parse_phase() {
            local phase="$1"
            local file="benchmark-phase/${phase}.env"
            if [[ ! -f "$file" ]]; then
              echo "Missing timing artifact for phase ${phase}" >&2
              ls -R benchmark-phase || true
              exit 1
            fi
            local seconds
            seconds="$(grep "^seconds=" "$file" | head -n1 | cut -d= -f2-)"
            if [[ -z "${seconds}" ]]; then
              echo "Timing artifact for phase ${phase} has empty seconds" >&2
              cat "$file" >&2
              exit 1
            fi
            echo "${phase}_seconds=${seconds}" >> "$GITHUB_OUTPUT"
          }
          parse_phase warm1
          parse_phase warm2
          parse_phase stale
      - name: Measure GHA cache storage usage
        id: cache_size
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bytes="$(.benchmark-config/scripts/sum-gha-cache-by-key.sh "${{ needs.seed-cache.outputs.seed_cache_key }}" "${{ needs.seed-cache.outputs.scope_started_at }}")"
          echo "bytes=${bytes}" >> "$GITHUB_OUTPUT"

      - name: Write benchmark artifacts
        id: artifact_files
        run: |
          .benchmark-config/scripts/write-benchmark-artifacts.sh \
            --benchmark "$BENCHMARK_ID" \
            --strategy "actions-cache" \
            --project-repo "$PROJECT_REPO" \
            --project-ref "$PROJECT_REF" \
            --cold-seconds "${{ needs.seed-cache.outputs.cold_seconds }}" \
            --warm1-seconds "${{ steps.timings.outputs.warm1_seconds }}" \
            --warm2-seconds "${{ steps.timings.outputs.warm2_seconds }}" \
            --stale-docker-seconds "${{ steps.timings.outputs.stale_seconds }}" \
            --cache-storage-bytes "${{ steps.cache_size.outputs.bytes }}" \
            --cache-storage-source "github-actions-cache-api" \
            --hit-behavior-note "Cold+seed run rebuilds from empty state with sccache enabled, then saves cargo registry/git, target, and sccache directories to actions/cache (primary key with fallback key retry) while recording cold timing. Workflow waits for cache index visibility before warm phases. Warm1/Warm2 and stale require successful cache restore before build. Stale run restores warm cache, mutates one Rust source file, then rebuilds. Warm1/Warm2/stale phases run as isolated matrix jobs on separate runners to avoid cross-phase local cache/state reuse."

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ env.BENCHMARK_ID }}-actions-cache
          path: |
            ${{ steps.artifact_files.outputs.json_path }}
            ${{ steps.artifact_files.outputs.md_path }}
          if-no-files-found: error

      - name: Publish summary
        run: cat "${{ steps.artifact_files.outputs.md_path }}" >> "$GITHUB_STEP_SUMMARY"
