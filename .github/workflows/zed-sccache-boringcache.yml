name: "Zed sccache - BoringCache"

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/zed-sccache-boringcache.yml"
      - ".github/workflows/zed-sccache-actions-cache.yml"
      - "scripts/**"

permissions:
  contents: read
  actions: read

env:
  PROJECT_REPO: zed-industries/zed
  PROJECT_REF: "ca0fffb927b9bd94b884b7180f3d8779c3583a98"
  BENCHMARK_ID: zed-sccache
  BENCHMARK_WORKSPACE: boringcache/benchmarks

jobs:
  seed-cache:
    name: sccache Seed (BoringCache, cold)
    runs-on: ubuntu-latest
    timeout-minutes: 240
    outputs:
      tags_csv: ${{ steps.scope.outputs.tags_csv }}
      cold_seconds: ${{ steps.cold_baseline_build.outputs.seconds }}
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PROJECT_REPO }}
          ref: ${{ env.PROJECT_REF }}

      - name: Checkout benchmark config
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          path: .benchmark-config

      - name: Setup BoringCache CLI
        uses: boringcache/setup-boringcache@v1
        with:
          token: ${{ secrets.BORINGCACHE_API_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libvulkan-dev \
            libasound2-dev libfontconfig1-dev libfreetype6-dev \
            libssl-dev pkg-config cmake \
            libx11-dev libx11-xcb-dev libxcb1-dev \
            libxcursor-dev libxinerama-dev libxi-dev libxrandr-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install sccache
        run: |
          set -euo pipefail
          SCCACHE_VERSION="0.13.0"
          ARCHIVE="sccache-v${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          URL="https://github.com/mozilla/sccache/releases/download/v${SCCACHE_VERSION}/${ARCHIVE}"
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT
          curl -sS --fail --location --output "${TMP_DIR}/${ARCHIVE}" "$URL"
          tar -xzf "${TMP_DIR}/${ARCHIVE}" -C "$TMP_DIR"
          sudo install -m 0755 "${TMP_DIR}/sccache-v${SCCACHE_VERSION}-x86_64-unknown-linux-musl/sccache" /usr/local/bin/sccache
          sccache --version

      - name: Prepare benchmark scope and helpers
        id: scope
        run: |
          set -euo pipefail

          scope_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          rust_release="$(rustc --version --verbose | awk '/^release:/{print $2}')"
          rust_minor="$(echo "${rust_release}" | awk -F. '{print $1 "." $2}')"
          tag_cargo_registry="${BENCHMARK_ID}-cargo-registry"
          tag_cargo_git="${BENCHMARK_ID}-cargo-git"
          tag_target="${BENCHMARK_ID}-target-rust${rust_minor}"
          # Run-scoped tag ensures cold build starts with empty remote cache.
          # boringcache delete can't purge cache-registry proxy data, so we
          # use a unique tag per run instead.
          tag_sccache="${BENCHMARK_ID}-sccache-rust${rust_minor}-r${GITHUB_RUN_ID}-a${GITHUB_RUN_ATTEMPT}"
          tags_csv="${tag_cargo_registry},${tag_cargo_git},${tag_target},${tag_sccache}"

          echo "scope_started_at=${scope_started_at}" >> "$GITHUB_OUTPUT"
          echo "rust_release=${rust_release}" >> "$GITHUB_OUTPUT"
          echo "rust_minor=${rust_minor}" >> "$GITHUB_OUTPUT"
          echo "tag_cargo_registry=${tag_cargo_registry}" >> "$GITHUB_OUTPUT"
          echo "tag_cargo_git=${tag_cargo_git}" >> "$GITHUB_OUTPUT"
          echo "tag_target=${tag_target}" >> "$GITHUB_OUTPUT"
          echo "tag_sccache=${tag_sccache}" >> "$GITHUB_OUTPUT"
          echo "tags_csv=${tags_csv}" >> "$GITHUB_OUTPUT"

          cat > ./run-zed-sccache-phase.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail

          mode="${1:-warm}"

          proxy_port=5000
          proxy_log="$(mktemp /tmp/boringcache-proxy.XXXXXX.log)"
          proxy_pid=""

          start_proxy() {
            : > "$proxy_log"
            proxy_metrics="$(mktemp /tmp/boringcache-proxy-metrics.XXXXXX.jsonl)"
            RUST_LOG=info \
            BORINGCACHE_OBSERVABILITY_INCLUDE_CACHE_OPS=1 \
            BORINGCACHE_REQUEST_METRICS_PATH="$proxy_metrics" \
            boringcache cache-registry "$BENCHMARK_WORKSPACE" "$BORINGCACHE_TAG_SCCACHE" \
              --host 127.0.0.1 --port "$proxy_port" --no-git --verbose > "$proxy_log" 2>&1 &
            proxy_pid=$!
          }

          stop_proxy() {
            if [[ -n "${proxy_pid:-}" ]] && kill -0 "$proxy_pid" >/dev/null 2>&1; then
              kill -INT "$proxy_pid" >/dev/null 2>&1 || true
              local i=0
              while kill -0 "$proxy_pid" >/dev/null 2>&1 && [[ $i -lt 300 ]]; do
                sleep 1
                i=$((i + 1))
              done
              if kill -0 "$proxy_pid" >/dev/null 2>&1; then
                echo "Proxy did not exit within 300s; force killing" >&2
                kill -9 "$proxy_pid" >/dev/null 2>&1 || true
              fi
              wait "$proxy_pid" 2>/dev/null || true
            fi
            proxy_pid=""
          }

          wait_proxy_ready() {
            local ready=0
            for _ in $(seq 1 60); do
              code="$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:${proxy_port}/v2/" || true)"
              if [[ "$code" == "200" || "$code" == "401" ]]; then
                ready=1
                break
              fi
              sleep 1
            done
            [[ "$ready" -eq 1 ]]
          }

          cleanup() {
            stop_proxy
            echo "=== Proxy log (last 200 lines) ==="
            tail -n 200 "$proxy_log" 2>/dev/null || true
            echo "=== End proxy log ==="
          }
          trap cleanup EXIT

          run_cold_build() {
            cargo build --release
          }

          run_cached_build() {
            export SCCACHE_DIR="${HOME}/.cache/sccache"
            export SCCACHE_WEBDAV_ENDPOINT="http://127.0.0.1:${proxy_port}/"
            export SCCACHE_IDLE_TIMEOUT="0"
            export RUSTC_WRAPPER="sccache"
            export CC="sccache cc"
            export CXX="sccache c++"
            mkdir -p "$SCCACHE_DIR"

            sccache --start-server || true
            cargo build --release
            sccache --show-stats || true
            # Stop sccache server so it flushes pending uploads to the proxy
            sccache --stop-server || true
          }

          apply_stale_change() {
            local stale_file
            stale_file=""
            while IFS= read -r candidate; do
              stale_file="${candidate}"
              break
            done < <(git ls-files -- '*.rs')
            if [[ -z "${stale_file}" ]]; then
              echo "No Rust source file found for stale mutation" >&2
              exit 1
            fi

            echo "// benchmark stale mutation ${GITHUB_RUN_ID:-local}-$(date +%s)" >> "${stale_file}"
            echo "Applied stale change to ${stale_file}"
          }

          case "$mode" in
            cold)
              run_cold_build
              ;;
            seed|warm)
              start_proxy
              if ! wait_proxy_ready; then
                echo "Registry proxy did not become ready" >&2
                tail -n 200 "$proxy_log" || true
                exit 1
              fi
              run_cached_build
              stop_proxy
              ;;
            stale)
              start_proxy
              if ! wait_proxy_ready; then
                echo "Registry proxy did not become ready" >&2
                tail -n 200 "$proxy_log" || true
                exit 1
              fi
              apply_stale_change
              run_cached_build
              stop_proxy
              ;;
            *)
              echo "Unknown mode: $mode" >&2
              exit 1
              ;;
          esac
          SH
          chmod +x ./run-zed-sccache-phase.sh

      - name: Purge BoringCache benchmark tags
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
        run: |
          set -euo pipefail
          boringcache delete --no-git "$BENCHMARK_WORKSPACE" "${{ steps.scope.outputs.tags_csv }}" || true

      - name: Run cold + seed cache build
        id: cold_baseline_build
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
          BORINGCACHE_TAG_SCCACHE: ${{ steps.scope.outputs.tag_sccache }}
        run: |
          set -euo pipefail
          rm -rf target "$HOME/.cargo/registry" "$HOME/.cargo/git" "$HOME/.cache/sccache"
          mkdir -p target "$HOME/.cargo/registry" "$HOME/.cargo/git" "$HOME/.cache/sccache"

          start="$(date +%s)"
          ./run-zed-sccache-phase.sh seed
          boringcache save --no-git "$BENCHMARK_WORKSPACE" \
            "${{ steps.scope.outputs.tag_cargo_registry }}:${HOME}/.cargo/registry,${{ steps.scope.outputs.tag_cargo_git }}:${HOME}/.cargo/git,${{ steps.scope.outputs.tag_target }}:target"
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Verify seed cache entries exist
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.scope.outputs.tag_sccache }}"
          echo "Verifying seed cache entries for tag: ${tag}"
          if boringcache check --no-git "${BENCHMARK_WORKSPACE}" "${tag}"; then
            echo "Seed cache entries confirmed visible in backend"
          else
            echo "WARNING: Seed cache entries NOT found - flush may not have completed before proxy shutdown" >&2
          fi

  scenario-builds:
    name: sccache Scenario (${{ matrix.phase }}) (BoringCache)
    needs: seed-cache
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        phase: [warm1, warm2, stale]
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PROJECT_REPO }}
          ref: ${{ env.PROJECT_REF }}

      - name: Checkout benchmark config
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          path: .benchmark-config

      - name: Setup BoringCache CLI
        uses: boringcache/setup-boringcache@v1
        with:
          token: ${{ secrets.BORINGCACHE_API_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libvulkan-dev \
            libasound2-dev libfontconfig1-dev libfreetype6-dev \
            libssl-dev pkg-config cmake \
            libx11-dev libx11-xcb-dev libxcb1-dev \
            libxcursor-dev libxinerama-dev libxi-dev libxrandr-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install sccache
        run: |
          set -euo pipefail
          SCCACHE_VERSION="0.13.0"
          ARCHIVE="sccache-v${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          URL="https://github.com/mozilla/sccache/releases/download/v${SCCACHE_VERSION}/${ARCHIVE}"
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT
          curl -sS --fail --location --output "${TMP_DIR}/${ARCHIVE}" "$URL"
          tar -xzf "${TMP_DIR}/${ARCHIVE}" -C "$TMP_DIR"
          sudo install -m 0755 "${TMP_DIR}/sccache-v${SCCACHE_VERSION}-x86_64-unknown-linux-musl/sccache" /usr/local/bin/sccache
          sccache --version

      - name: Prepare benchmark scope and helpers
        id: scope
        run: |
          set -euo pipefail

          scope_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          rust_release="$(rustc --version --verbose | awk '/^release:/{print $2}')"
          rust_minor="$(echo "${rust_release}" | awk -F. '{print $1 "." $2}')"
          tag_cargo_registry="${BENCHMARK_ID}-cargo-registry"
          tag_cargo_git="${BENCHMARK_ID}-cargo-git"
          tag_target="${BENCHMARK_ID}-target-rust${rust_minor}"
          # Run-scoped tag ensures cold build starts with empty remote cache.
          # boringcache delete can't purge cache-registry proxy data, so we
          # use a unique tag per run instead.
          tag_sccache="${BENCHMARK_ID}-sccache-rust${rust_minor}-r${GITHUB_RUN_ID}-a${GITHUB_RUN_ATTEMPT}"
          tags_csv="${tag_cargo_registry},${tag_cargo_git},${tag_target},${tag_sccache}"

          echo "scope_started_at=${scope_started_at}" >> "$GITHUB_OUTPUT"
          echo "rust_release=${rust_release}" >> "$GITHUB_OUTPUT"
          echo "rust_minor=${rust_minor}" >> "$GITHUB_OUTPUT"
          echo "tag_cargo_registry=${tag_cargo_registry}" >> "$GITHUB_OUTPUT"
          echo "tag_cargo_git=${tag_cargo_git}" >> "$GITHUB_OUTPUT"
          echo "tag_target=${tag_target}" >> "$GITHUB_OUTPUT"
          echo "tag_sccache=${tag_sccache}" >> "$GITHUB_OUTPUT"
          echo "tags_csv=${tags_csv}" >> "$GITHUB_OUTPUT"

          cat > ./run-zed-sccache-phase.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail

          mode="${1:-warm}"

          proxy_port=5000
          proxy_log="$(mktemp /tmp/boringcache-proxy.XXXXXX.log)"
          proxy_pid=""

          start_proxy() {
            : > "$proxy_log"
            proxy_metrics="$(mktemp /tmp/boringcache-proxy-metrics.XXXXXX.jsonl)"
            RUST_LOG=info \
            BORINGCACHE_OBSERVABILITY_INCLUDE_CACHE_OPS=1 \
            BORINGCACHE_REQUEST_METRICS_PATH="$proxy_metrics" \
            boringcache cache-registry "$BENCHMARK_WORKSPACE" "$BORINGCACHE_TAG_SCCACHE" \
              --host 127.0.0.1 --port "$proxy_port" --no-git --verbose > "$proxy_log" 2>&1 &
            proxy_pid=$!
          }

          stop_proxy() {
            if [[ -n "${proxy_pid:-}" ]] && kill -0 "$proxy_pid" >/dev/null 2>&1; then
              kill -INT "$proxy_pid" >/dev/null 2>&1 || true
              local i=0
              while kill -0 "$proxy_pid" >/dev/null 2>&1 && [[ $i -lt 300 ]]; do
                sleep 1
                i=$((i + 1))
              done
              if kill -0 "$proxy_pid" >/dev/null 2>&1; then
                echo "Proxy did not exit within 300s; force killing" >&2
                kill -9 "$proxy_pid" >/dev/null 2>&1 || true
              fi
              wait "$proxy_pid" 2>/dev/null || true
            fi
            proxy_pid=""
          }

          wait_proxy_ready() {
            local ready=0
            for _ in $(seq 1 60); do
              code="$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:${proxy_port}/v2/" || true)"
              if [[ "$code" == "200" || "$code" == "401" ]]; then
                ready=1
                break
              fi
              sleep 1
            done
            [[ "$ready" -eq 1 ]]
          }

          cleanup() {
            stop_proxy
            echo "=== Proxy log (last 200 lines) ==="
            tail -n 200 "$proxy_log" 2>/dev/null || true
            echo "=== End proxy log ==="
          }
          trap cleanup EXIT

          run_cold_build() {
            cargo build --release
          }

          run_cached_build() {
            export SCCACHE_DIR="${HOME}/.cache/sccache"
            export SCCACHE_WEBDAV_ENDPOINT="http://127.0.0.1:${proxy_port}/"
            export SCCACHE_IDLE_TIMEOUT="0"
            export RUSTC_WRAPPER="sccache"
            export CC="sccache cc"
            export CXX="sccache c++"
            mkdir -p "$SCCACHE_DIR"

            sccache --start-server || true
            cargo build --release
            sccache --show-stats || true
            # Stop sccache server so it flushes pending uploads to the proxy
            sccache --stop-server || true
          }

          apply_stale_change() {
            local stale_file
            stale_file=""
            while IFS= read -r candidate; do
              stale_file="${candidate}"
              break
            done < <(git ls-files -- '*.rs')
            if [[ -z "${stale_file}" ]]; then
              echo "No Rust source file found for stale mutation" >&2
              exit 1
            fi

            echo "// benchmark stale mutation ${GITHUB_RUN_ID:-local}-$(date +%s)" >> "${stale_file}"
            echo "Applied stale change to ${stale_file}"
          }

          case "$mode" in
            cold)
              run_cold_build
              ;;
            seed|warm)
              start_proxy
              if ! wait_proxy_ready; then
                echo "Registry proxy did not become ready" >&2
                tail -n 200 "$proxy_log" || true
                exit 1
              fi
              run_cached_build
              stop_proxy
              ;;
            stale)
              start_proxy
              if ! wait_proxy_ready; then
                echo "Registry proxy did not become ready" >&2
                tail -n 200 "$proxy_log" || true
                exit 1
              fi
              apply_stale_change
              run_cached_build
              stop_proxy
              ;;
            *)
              echo "Unknown mode: $mode" >&2
              exit 1
              ;;
          esac
          SH
          chmod +x ./run-zed-sccache-phase.sh

      - name: Run warm build 1
        id: warm1_build
        if: matrix.phase == 'warm1'
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
          BORINGCACHE_TAG_SCCACHE: ${{ steps.scope.outputs.tag_sccache }}
        run: |
          set -euo pipefail
          rm -rf target "$HOME/.cargo/registry" "$HOME/.cargo/git" "$HOME/.cache/sccache"
          mkdir -p target "$HOME/.cargo/registry" "$HOME/.cargo/git" "$HOME/.cache/sccache"

          start="$(date +%s)"
          boringcache restore --no-git "$BENCHMARK_WORKSPACE" \
            "${{ steps.scope.outputs.tag_cargo_registry }}:${HOME}/.cargo/registry,${{ steps.scope.outputs.tag_cargo_git }}:${HOME}/.cargo/git,${{ steps.scope.outputs.tag_target }}:target"
          ./run-zed-sccache-phase.sh warm
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Run warm build 2
        id: warm2_build
        if: matrix.phase == 'warm2'
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
          BORINGCACHE_TAG_SCCACHE: ${{ steps.scope.outputs.tag_sccache }}
        run: |
          set -euo pipefail
          rm -rf target "$HOME/.cargo/registry" "$HOME/.cargo/git" "$HOME/.cache/sccache"
          mkdir -p target "$HOME/.cargo/registry" "$HOME/.cargo/git" "$HOME/.cache/sccache"

          start="$(date +%s)"
          boringcache restore --no-git "$BENCHMARK_WORKSPACE" \
            "${{ steps.scope.outputs.tag_cargo_registry }}:${HOME}/.cargo/registry,${{ steps.scope.outputs.tag_cargo_git }}:${HOME}/.cargo/git,${{ steps.scope.outputs.tag_target }}:target"
          ./run-zed-sccache-phase.sh warm
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Run stale build
        id: stale_docker_build
        if: matrix.phase == 'stale'
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
          BORINGCACHE_TAG_SCCACHE: ${{ steps.scope.outputs.tag_sccache }}
        run: |
          set -euo pipefail
          rm -rf target "$HOME/.cargo/registry" "$HOME/.cargo/git" "$HOME/.cache/sccache"
          mkdir -p target "$HOME/.cargo/registry" "$HOME/.cargo/git" "$HOME/.cache/sccache"

          start="$(date +%s)"
          boringcache restore --no-git "$BENCHMARK_WORKSPACE" \
            "${{ steps.scope.outputs.tag_cargo_registry }}:${HOME}/.cargo/registry,${{ steps.scope.outputs.tag_cargo_git }}:${HOME}/.cargo/git,${{ steps.scope.outputs.tag_target }}:target"
          ./run-zed-sccache-phase.sh stale
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Upload scenario proxy diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scenario-proxy-diagnostics-${{ env.BENCHMARK_ID }}-boringcache-${{ matrix.phase }}
          path: /tmp/boringcache-proxy.*.log
          if-no-files-found: warn

      - name: Capture scenario timing
        id: phase_timing
        run: |
          set -euo pipefail
          seconds=""
          case "${{ matrix.phase }}" in
            warm1)
              seconds="${{ steps.warm1_build.outputs.seconds }}"
              ;;
            warm2)
              seconds="${{ steps.warm2_build.outputs.seconds }}"
              ;;
            stale)
              seconds="${{ steps.stale_docker_build.outputs.seconds }}"
              ;;
            *)
              echo "Unknown phase: ${{ matrix.phase }}" >&2
              exit 1
              ;;
          esac
          if [[ -z "${seconds}" ]]; then
            echo "No timing captured for phase ${{ matrix.phase }}" >&2
            exit 1
          fi
          echo "seconds=${seconds}" >> "$GITHUB_OUTPUT"
      - name: Persist scenario timing artifact
        run: |
          set -euo pipefail
          mkdir -p benchmark-phase
          cat > "benchmark-phase/${{ matrix.phase }}.env" <<EOF
          phase=${{ matrix.phase }}
          seconds=${{ steps.phase_timing.outputs.seconds }}
          EOF
      - name: Upload scenario timing artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-phase-${{ env.BENCHMARK_ID }}-boringcache-${{ matrix.phase }}
          path: benchmark-phase/${{ matrix.phase }}.env
          if-no-files-found: error

  finalize-benchmark:
    name: Finalize benchmark artifacts
    needs: [seed-cache, scenario-builds]
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Checkout benchmark config
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          path: .benchmark-config

      - name: Setup BoringCache CLI
        uses: boringcache/setup-boringcache@v1
        with:
          token: ${{ secrets.BORINGCACHE_API_TOKEN }}

      - name: Download scenario timing artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: benchmark-phase-${{ env.BENCHMARK_ID }}-boringcache-*
          path: benchmark-phase
          merge-multiple: true
      - name: Collect scenario timings
        id: timings
        run: |
          set -euo pipefail
          parse_phase() {
            local phase="$1"
            local file="benchmark-phase/${phase}.env"
            if [[ ! -f "$file" ]]; then
              echo "Missing timing artifact for phase ${phase}" >&2
              ls -R benchmark-phase || true
              exit 1
            fi
            local seconds
            seconds="$(grep "^seconds=" "$file" | head -n1 | cut -d= -f2-)"
            if [[ -z "${seconds}" ]]; then
              echo "Timing artifact for phase ${phase} has empty seconds" >&2
              cat "$file" >&2
              exit 1
            fi
            echo "${phase}_seconds=${seconds}" >> "$GITHUB_OUTPUT"
          }
          parse_phase warm1
          parse_phase warm2
          parse_phase stale
      - name: Measure BoringCache storage usage
        id: cache_size
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
        run: |
          tags_csv="${{ needs.seed-cache.outputs.tags_csv }}"
          bytes="$(.benchmark-config/scripts/sum-boringcache-check-sizes.sh "$BENCHMARK_WORKSPACE" "$tags_csv")"
          echo "bytes=${bytes}" >> "$GITHUB_OUTPUT"

      - name: Write benchmark artifacts
        id: artifact_files
        run: |
          .benchmark-config/scripts/write-benchmark-artifacts.sh \
            --benchmark "$BENCHMARK_ID" \
            --strategy "boringcache" \
            --project-repo "$PROJECT_REPO" \
            --project-ref "$PROJECT_REF" \
            --cold-seconds "${{ needs.seed-cache.outputs.cold_seconds }}" \
            --warm1-seconds "${{ steps.timings.outputs.warm1_seconds }}" \
            --warm2-seconds "${{ steps.timings.outputs.warm2_seconds }}" \
            --stale-docker-seconds "${{ steps.timings.outputs.stale_seconds }}" \
            --cache-storage-bytes "${{ steps.cache_size.outputs.bytes }}" \
            --cache-storage-source "boringcache-check" \
            --hit-behavior-note "Cold+seed run starts boringcache cache-registry as native sccache WebDAV backend, rebuilds from empty state with sccache pointed at proxy, then saves cargo registry/git and target to BoringCache while recording cold timing. sccache artifacts are stored natively via the proxy (no save/restore). Each phase clears local ~/.cache/sccache first so warm hits come from the proxy-backed cache. Warm1/Warm2 restore cargo caches and run with proxy-backed sccache. Stale run restores warm cache, mutates one Rust source file, then rebuilds. Warm1/Warm2/stale phases run as isolated matrix jobs on separate runners to avoid cross-phase local cache/state reuse."

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ env.BENCHMARK_ID }}-boringcache
          path: |
            ${{ steps.artifact_files.outputs.json_path }}
            ${{ steps.artifact_files.outputs.md_path }}
          if-no-files-found: error

      - name: Publish summary
        run: cat "${{ steps.artifact_files.outputs.md_path }}" >> "$GITHUB_STEP_SUMMARY"
