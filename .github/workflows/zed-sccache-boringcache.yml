              done < <(eval "$fallback")
            fi
            if [[ -z "${stale_file}" ]]; then
              echo "No Rust source file found for stale mutation" >&2
              exit 1
            fi

            echo "// benchmark stale mutation ${GITHUB_RUN_ID:-local}-$(date +%s)" >> "${stale_file}"
            echo "Applied stale change to ${stale_file}"
          }

          if [[ -n "$timing_file" ]]; then
            : > "$timing_file"
          fi

          case "$mode" in
            cold)
              run_cold_build
              ;;
            seed|warm)
              start_proxy
              if ! wait_for_proxy_ready; then
                echo "Registry proxy did not become ready" >&2
                tail -n 200 "$proxy_log" || true
                exit 1
              fi
              run_cached_build
              stop_proxy
              ;;
            stale-low)
              start_proxy
              if ! wait_for_proxy_ready; then
                echo "Registry proxy did not become ready" >&2
                tail -n 200 "$proxy_log" || true
                exit 1
              fi
              apply_stale_change "git ls-files -- 'crates/*/tests/**/*.rs' 'crates/storybook/**/*.rs' | head -n1" "git ls-files -- '*.rs' | head -n1"
              run_cached_build
              stop_proxy
              ;;
            stale-mid)
              start_proxy
              if ! wait_for_proxy_ready; then
                echo "Registry proxy did not become ready" >&2
                tail -n 200 "$proxy_log" || true
                exit 1
              fi
              apply_stale_change "git ls-files -- 'crates/editor/src/**/*.rs' 'crates/project/src/**/*.rs' | head -n1"
              run_cached_build
              stop_proxy
              ;;
            stale-high)
              start_proxy
              if ! wait_for_proxy_ready; then
                echo "Registry proxy did not become ready" >&2
                tail -n 200 "$proxy_log" || true
                exit 1
              fi
              apply_stale_change "git ls-files -- 'crates/gpui/src/**/*.rs' 'crates/settings/src/**/*.rs' | head -n1"
              run_cached_build
              stop_proxy
              ;;
            *)
              echo "Unknown mode: $mode" >&2
              exit 1
              ;;
          esac
          SH
          chmod +x ./run-zed-sccache-phase.sh

      - name: Capture archive restore start
        id: archive_restore_start
        run: echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Configure boringcache/one for Rust archives
        uses: boringcache/one@v1
        with:
          cli-version: skip
          setup: mise
          mode: rust-sccache
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          working-directory: .
          cache-tag: ${{ env.BENCHMARK_ID }}
          cache-cargo: true
          cache-target: true
          tools: rust@${{ env.CLI_RUST_VERSION }}
          sccache: true
          cargo-tag: ${{ steps.scope.outputs.tag_cargo_registry }}
          cargo-git-tag: ${{ steps.scope.outputs.tag_cargo_git }}
          target-tag: ${{ steps.scope.outputs.tag_target }}
          verbose: true
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}

      - name: Capture archive restore timing
        id: archive_restore_timing
        run: |
          set -euo pipefail
          start="${{ steps.archive_restore_start.outputs.started_at }}"
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Run warm build 1
        id: warm1_build
        if: matrix.phase == 'warm1'
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
          BORINGCACHE_TAG_SCCACHE: ${{ steps.scope.outputs.tag_sccache }}
        run: |
          set -euo pipefail
          rm -rf target "$HOME/.cargo/registry" "$HOME/.cargo/git" "$HOME/.cache/sccache"
          mkdir -p target "$HOME/.cargo/registry" "$HOME/.cargo/git" "$HOME/.cache/sccache"

          timing_file="/tmp/zed-sccache-${{ matrix.phase }}-timing.env"
          start="$(date +%s)"
          BENCHMARK_PHASE_LABEL="${{ matrix.phase }}" BENCHMARK_TIMING_FILE="$timing_file" ./run-zed-sccache-phase.sh warm
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"
          echo "proxy_ready_seconds=$(grep '^proxy_ready_seconds=' "$timing_file" | head -n1 | cut -d= -f2-)" >> "$GITHUB_OUTPUT"
          echo "build_seconds=$(grep '^build_seconds=' "$timing_file" | head -n1 | cut -d= -f2-)" >> "$GITHUB_OUTPUT"

      - name: Run warm build 2
        id: warm2_build
        if: matrix.phase == 'warm2'
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
          BORINGCACHE_TAG_SCCACHE: ${{ steps.scope.outputs.tag_sccache }}
        run: |
          set -euo pipefail
          rm -rf target "$HOME/.cargo/registry" "$HOME/.cargo/git" "$HOME/.cache/sccache"
          mkdir -p target "$HOME/.cargo/registry" "$HOME/.cargo/git" "$HOME/.cache/sccache"

          timing_file="/tmp/zed-sccache-${{ matrix.phase }}-timing.env"
          start="$(date +%s)"
          BENCHMARK_PHASE_LABEL="${{ matrix.phase }}" BENCHMARK_TIMING_FILE="$timing_file" ./run-zed-sccache-phase.sh warm
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"
          echo "proxy_ready_seconds=$(grep '^proxy_ready_seconds=' "$timing_file" | head -n1 | cut -d= -f2-)" >> "$GITHUB_OUTPUT"
          echo "build_seconds=$(grep '^build_seconds=' "$timing_file" | head -n1 | cut -d= -f2-)" >> "$GITHUB_OUTPUT"

      - name: Run stale-low build
        id: stale_low_build
        if: matrix.phase == 'stale-low'
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
          BORINGCACHE_TAG_SCCACHE: ${{ steps.scope.outputs.tag_sccache }}
        run: |
          set -euo pipefail
          rm -rf target "$HOME/.cargo/registry" "$HOME/.cargo/git" "$HOME/.cache/sccache"
          mkdir -p target "$HOME/.cargo/registry" "$HOME/.cargo/git" "$HOME/.cache/sccache"

          timing_file="/tmp/zed-sccache-${{ matrix.phase }}-timing.env"
          start="$(date +%s)"
          BENCHMARK_PHASE_LABEL="${{ matrix.phase }}" BENCHMARK_TIMING_FILE="$timing_file" ./run-zed-sccache-phase.sh stale-low
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"
          echo "proxy_ready_seconds=$(grep '^proxy_ready_seconds=' "$timing_file" | head -n1 | cut -d= -f2-)" >> "$GITHUB_OUTPUT"
          echo "build_seconds=$(grep '^build_seconds=' "$timing_file" | head -n1 | cut -d= -f2-)" >> "$GITHUB_OUTPUT"

      - name: Run stale-mid build
        id: stale_mid_build
        if: matrix.phase == 'stale-mid'
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
          BORINGCACHE_TAG_SCCACHE: ${{ steps.scope.outputs.tag_sccache }}
        run: |
          set -euo pipefail
          rm -rf target "$HOME/.cargo/registry" "$HOME/.cargo/git" "$HOME/.cache/sccache"
          mkdir -p target "$HOME/.cargo/registry" "$HOME/.cargo/git" "$HOME/.cache/sccache"

          timing_file="/tmp/zed-sccache-${{ matrix.phase }}-timing.env"
          start="$(date +%s)"
          BENCHMARK_PHASE_LABEL="${{ matrix.phase }}" BENCHMARK_TIMING_FILE="$timing_file" ./run-zed-sccache-phase.sh stale-mid
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"
          echo "proxy_ready_seconds=$(grep '^proxy_ready_seconds=' "$timing_file" | head -n1 | cut -d= -f2-)" >> "$GITHUB_OUTPUT"
          echo "build_seconds=$(grep '^build_seconds=' "$timing_file" | head -n1 | cut -d= -f2-)" >> "$GITHUB_OUTPUT"

      - name: Run stale-high build
        id: stale_high_build
        if: matrix.phase == 'stale-high'
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
          BORINGCACHE_TAG_SCCACHE: ${{ steps.scope.outputs.tag_sccache }}
        run: |
          set -euo pipefail
          rm -rf target "$HOME/.cargo/registry" "$HOME/.cargo/git" "$HOME/.cache/sccache"
          mkdir -p target "$HOME/.cargo/registry" "$HOME/.cargo/git" "$HOME/.cache/sccache"

          timing_file="/tmp/zed-sccache-${{ matrix.phase }}-timing.env"
          start="$(date +%s)"
          BENCHMARK_PHASE_LABEL="${{ matrix.phase }}" BENCHMARK_TIMING_FILE="$timing_file" ./run-zed-sccache-phase.sh stale-high
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"
          echo "proxy_ready_seconds=$(grep '^proxy_ready_seconds=' "$timing_file" | head -n1 | cut -d= -f2-)" >> "$GITHUB_OUTPUT"
          echo "build_seconds=$(grep '^build_seconds=' "$timing_file" | head -n1 | cut -d= -f2-)" >> "$GITHUB_OUTPUT"

      - name: Collect BoringCache diagnostics
        if: always()
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
        run: |
          set -euo pipefail
          .benchmark-config/scripts/collect-boringcache-diagnostics.sh \
            --output-dir "boringcache-diag-${{ matrix.phase }}" \
            --workspace "$BENCHMARK_WORKSPACE" \
            --tags "${{ steps.scope.outputs.tags_csv }}" \
            --phase "${{ matrix.phase }}" \
            --cache-tag "${{ steps.scope.outputs.tag_sccache }}" \
            --cli-source "${{ needs.prepare-cli.outputs.cli_source }}" \
            --cli-ref "${{ needs.prepare-cli.outputs.cli_ref }}" \
            --proxy-port "5000" \
            --proxy-log-path "/tmp/boringcache-proxy-5000.log" \
            --cache-root "$HOME/.cache/sccache" \
            --cache-label "sccache-cache"

      - name: Upload BoringCache diagnostics
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: boringcache-diag-${{ env.BENCHMARK_ID }}-${{ matrix.phase }}-boringcache
          path: boringcache-diag-${{ matrix.phase }}
          if-no-files-found: warn

      - name: Capture scenario timing
        id: phase_timing
        run: |
          set -euo pipefail
          seconds=""
          restore_seconds=""
          proxy_ready_seconds=""
          build_seconds=""
          case "${{ matrix.phase }}" in
            warm1)
              seconds="${{ steps.warm1_build.outputs.seconds }}"
              restore_seconds="${{ steps.archive_restore_timing.outputs.seconds }}"
              proxy_ready_seconds="${{ steps.warm1_build.outputs.proxy_ready_seconds }}"
              build_seconds="${{ steps.warm1_build.outputs.build_seconds }}"
              ;;
            warm2)
              seconds="${{ steps.warm2_build.outputs.seconds }}"
              restore_seconds="${{ steps.archive_restore_timing.outputs.seconds }}"
              proxy_ready_seconds="${{ steps.warm2_build.outputs.proxy_ready_seconds }}"
              build_seconds="${{ steps.warm2_build.outputs.build_seconds }}"
              ;;
            stale-low)
              seconds="${{ steps.stale_low_build.outputs.seconds }}"
              restore_seconds="${{ steps.archive_restore_timing.outputs.seconds }}"
              proxy_ready_seconds="${{ steps.stale_low_build.outputs.proxy_ready_seconds }}"
              build_seconds="${{ steps.stale_low_build.outputs.build_seconds }}"
              ;;
            stale-mid)
              seconds="${{ steps.stale_mid_build.outputs.seconds }}"
              restore_seconds="${{ steps.archive_restore_timing.outputs.seconds }}"
              proxy_ready_seconds="${{ steps.stale_mid_build.outputs.proxy_ready_seconds }}"
              build_seconds="${{ steps.stale_mid_build.outputs.build_seconds }}"
              ;;
            stale-high)
              seconds="${{ steps.stale_high_build.outputs.seconds }}"
              restore_seconds="${{ steps.archive_restore_timing.outputs.seconds }}"
              proxy_ready_seconds="${{ steps.stale_high_build.outputs.proxy_ready_seconds }}"
              build_seconds="${{ steps.stale_high_build.outputs.build_seconds }}"
              ;;
            *)
              echo "Unknown phase: ${{ matrix.phase }}" >&2
              exit 1
              ;;
          esac
          if [[ -z "${seconds}" || -z "${restore_seconds}" || -z "${proxy_ready_seconds}" || -z "${build_seconds}" ]]; then
            echo "No timing captured for phase ${{ matrix.phase }}" >&2
            exit 1
          fi
          echo "seconds=${seconds}" >> "$GITHUB_OUTPUT"
          echo "restore_seconds=${restore_seconds}" >> "$GITHUB_OUTPUT"
          echo "proxy_ready_seconds=${proxy_ready_seconds}" >> "$GITHUB_OUTPUT"
          echo "build_seconds=${build_seconds}" >> "$GITHUB_OUTPUT"
          echo "end_to_end_seconds=${seconds}" >> "$GITHUB_OUTPUT"
      - name: Persist scenario timing artifact
        run: |
          set -euo pipefail
          mkdir -p benchmark-phase
          cat > "benchmark-phase/${{ matrix.phase }}.env" <<EOF
          phase=${{ matrix.phase }}
          seconds=${{ steps.phase_timing.outputs.seconds }}
          restore_seconds=${{ steps.phase_timing.outputs.restore_seconds }}
          proxy_ready_seconds=${{ steps.phase_timing.outputs.proxy_ready_seconds }}
          build_seconds=${{ steps.phase_timing.outputs.build_seconds }}
          end_to_end_seconds=${{ steps.phase_timing.outputs.end_to_end_seconds }}
          EOF
      - name: Upload scenario timing artifact
        uses: actions/upload-artifact@v5
        with:
          name: benchmark-phase-${{ env.BENCHMARK_ID }}-boringcache-${{ matrix.phase }}
          path: benchmark-phase/${{ matrix.phase }}.env
          if-no-files-found: error

  finalize-benchmark:
    name: Finalize benchmark artifacts
    needs: [prepare-cli, seed-cache, scenario-builds]
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Checkout benchmark config
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          path: .benchmark-config

      - name: Install BoringCache CLI with boringcache/one
        uses: boringcache/one@v1
        with:
          setup: none
          mode: archive
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          cli-platform: linux-amd64
          cache-runtime: false

      - name: Download custom CLI artifact
        if: needs.prepare-cli.outputs.use_custom_cli == 'true'
        uses: actions/download-artifact@v5
        with:
          name: ${{ needs.prepare-cli.outputs.artifact_name }}
          path: ${{ runner.temp }}/boringcache-cli-artifact

      - name: Install custom CLI artifact
        if: needs.prepare-cli.outputs.use_custom_cli == 'true'
        run: |
          set -euo pipefail
          bash .benchmark-config/scripts/install-benchmark-cli.sh \
            --artifact-dir "${RUNNER_TEMP}/boringcache-cli-artifact"

      - name: Verify BoringCache CLI
        run: boringcache --version

      - name: Download scenario timing artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: benchmark-phase-${{ env.BENCHMARK_ID }}-boringcache-*
          path: benchmark-phase
          merge-multiple: true
      - name: Collect scenario timings
        id: timings
        run: |
          set -euo pipefail
          parse_phase() {
            local phase="$1"
            local key="${phase//-/_}"
            local file="benchmark-phase/${phase}.env"
            if [[ ! -f "$file" ]]; then
              echo "Missing timing artifact for phase ${phase}" >&2
              ls -R benchmark-phase || true
              exit 1
            fi
            local seconds
            seconds="$(grep "^seconds=" "$file" | head -n1 | cut -d= -f2-)"
            if [[ -z "${seconds}" ]]; then
              echo "Timing artifact for phase ${phase} has empty seconds" >&2
              cat "$file" >&2
              exit 1
            fi
            echo "${key}_seconds=${seconds}" >> "$GITHUB_OUTPUT"
          }
          parse_phase warm1
          parse_phase warm2
          parse_phase stale-low
          parse_phase stale-mid
          parse_phase stale-high
      - name: Measure BoringCache storage usage
        id: cache_size
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
        run: |
          tags_csv="${{ needs.seed-cache.outputs.tags_csv }}"
          bytes="$(.benchmark-config/scripts/sum-boringcache-check-sizes.sh "$BENCHMARK_WORKSPACE" "$tags_csv")"
          echo "bytes=${bytes}" >> "$GITHUB_OUTPUT"

      - name: Write benchmark artifacts
        id: artifact_files
        run: |
          .benchmark-config/scripts/write-benchmark-artifacts.sh \
            --benchmark "$BENCHMARK_ID" \
            --strategy "boringcache" \
            --project-repo "$PROJECT_REPO" \
            --project-ref "$PROJECT_REF" \
            --cold-seconds "${{ needs.seed-cache.outputs.cold_seconds }}" \
            --warm1-seconds "${{ steps.timings.outputs.warm1_seconds }}" \
            --warm2-seconds "${{ steps.timings.outputs.warm2_seconds }}" \
            --stale-low-seconds "${{ steps.timings.outputs.stale_low_seconds }}" \
            --stale-mid-seconds "${{ steps.timings.outputs.stale_mid_seconds }}" \
            --stale-high-seconds "${{ steps.timings.outputs.stale_high_seconds }}" \
            --cache-storage-bytes "${{ steps.cache_size.outputs.bytes }}" \
            --cache-storage-source "boringcache-check" \
            --hit-behavior-note "Cold+seed run starts boringcache cache-registry as native sccache WebDAV backend, rebuilds from empty state with sccache pointed at proxy, then saves cargo registry/git and target to BoringCache while recording cold timing. sccache artifacts are stored natively via the proxy (no save/restore). Each phase clears local ~/.cache/sccache first so warm hits come from the proxy-backed cache. Warm1/Warm2 restore cargo caches and run with proxy-backed sccache. Stale runs restore warm cache, mutate one Rust source file at the specified dependency level (low=leaf crate, mid=editor/project, high=gpui/settings), then rebuild. All phases run as isolated matrix jobs on separate runners to avoid cross-phase local cache/state reuse."

      - name: Write phase timing breakdown
        id: phase_breakdown
        run: |
          python3 .benchmark-config/scripts/write-phase-timing-breakdown.py \
            --benchmark "$BENCHMARK_ID" \
            --strategy "boringcache" \
            --phase-dir benchmark-phase \
            --output-dir benchmark-results

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v5
        with:
          name: benchmark-${{ env.BENCHMARK_ID }}-boringcache
          path: |
            ${{ steps.artifact_files.outputs.json_path }}
            ${{ steps.artifact_files.outputs.md_path }}
            ${{ steps.phase_breakdown.outputs.json_path }}
            ${{ steps.phase_breakdown.outputs.md_path }}
          if-no-files-found: error

      - name: Publish summary
        run: |
          cat "${{ steps.artifact_files.outputs.md_path }}" >> "$GITHUB_STEP_SUMMARY"
          printf '\n' >> "$GITHUB_STEP_SUMMARY"
          cat "${{ steps.phase_breakdown.outputs.md_path }}" >> "$GITHUB_STEP_SUMMARY"
