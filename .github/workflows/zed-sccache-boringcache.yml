name: "Zed sccache - BoringCache"

on:
  workflow_dispatch:
    inputs:
      cli_ref:
        description: "Optional boringcache/cli ref to build and use instead of the released CLI"
        required: false
        type: string
  pull_request:
    paths:
      - ".github/workflows/zed-sccache-boringcache.yml"
      - ".github/workflows/zed-sccache-actions-cache.yml"
      - "scripts/**"

permissions:
  contents: read
  actions: read

env:
  PROJECT_REPO: zed-industries/zed
  PROJECT_REF: "ca0fffb927b9bd94b884b7180f3d8779c3583a98"
  BENCHMARK_ID: zed-sccache
  BENCHMARK_WORKSPACE: boringcache/benchmarks
  CLI_RUST_VERSION: "1.89"

jobs:
  prepare-cli:
    name: Prepare benchmark CLI
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      use_custom_cli: ${{ steps.resolve.outputs.use_custom_cli }}
      artifact_name: ${{ steps.resolve.outputs.artifact_name }}
      cli_source: ${{ steps.metadata.outputs.cli_source }}
      cli_ref: ${{ steps.metadata.outputs.cli_ref }}
    steps:
      - name: Resolve CLI source
        id: resolve
        run: |
          set -euo pipefail
          requested_ref="${{ github.event.inputs.cli_ref || '' }}"
          if [[ -n "$requested_ref" ]]; then
            echo "use_custom_cli=true" >> "$GITHUB_OUTPUT"
            echo "artifact_name=boringcache-cli-linux-amd64" >> "$GITHUB_OUTPUT"
          else
            echo "use_custom_cli=false" >> "$GITHUB_OUTPUT"
            echo "artifact_name=" >> "$GITHUB_OUTPUT"
          fi
          echo "requested_ref=${requested_ref}" >> "$GITHUB_OUTPUT"

      - name: Checkout CLI repo
        if: steps.resolve.outputs.use_custom_cli == 'true'
        uses: actions/checkout@v5
        with:
          repository: boringcache/cli
          ref: ${{ steps.resolve.outputs.requested_ref }}

      - name: Setup Rust for custom CLI build
        if: steps.resolve.outputs.use_custom_cli == 'true'
        uses: boringcache/one@v1
        with:
          cli-version: skip
          setup: mise
          mode: rust-sccache
          tools: rust@${{ env.CLI_RUST_VERSION }}
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          working-directory: .
          cache-runtime: false
          cache-cargo: false
          cache-target: false
          sccache: false

      - name: Capture resolved CLI ref
        if: steps.resolve.outputs.use_custom_cli == 'true'
        id: resolved_ref
        run: |
          set -euo pipefail
          echo "cli_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build custom CLI
        if: steps.resolve.outputs.use_custom_cli == 'true'
        run: cargo build --release --locked

      - name: Upload custom CLI artifact
        if: steps.resolve.outputs.use_custom_cli == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.resolve.outputs.artifact_name }}
          path: target/release/boringcache
          if-no-files-found: error
          compression-level: 0

      - name: Finalize CLI metadata
        id: metadata
        run: |
          set -euo pipefail
          if [[ "${{ steps.resolve.outputs.use_custom_cli }}" == "true" ]]; then
            echo "cli_source=custom" >> "$GITHUB_OUTPUT"
            echo "cli_ref=${{ steps.resolved_ref.outputs.cli_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "cli_source=release" >> "$GITHUB_OUTPUT"
            echo "cli_ref=" >> "$GITHUB_OUTPUT"
          fi

  seed-cache:
    name: sccache Seed (BoringCache, cold)
    needs: prepare-cli
    runs-on: ubuntu-latest
    timeout-minutes: 240
    outputs:
      tags_csv: ${{ steps.scope.outputs.tags_csv }}
      cold_seconds: ${{ steps.cold_baseline_build.outputs.seconds }}
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v5
        with:
          repository: ${{ env.PROJECT_REPO }}
          ref: ${{ env.PROJECT_REF }}

      - name: Checkout benchmark config
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          path: .benchmark-config

      - name: Install BoringCache CLI with boringcache/one
        uses: boringcache/one@v1
        with:
          setup: none
          mode: archive
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          cli-platform: linux-amd64
          cache-runtime: false

      - name: Download custom CLI artifact
        if: needs.prepare-cli.outputs.use_custom_cli == 'true'
        uses: actions/download-artifact@v5
        with:
          name: ${{ needs.prepare-cli.outputs.artifact_name }}
          path: ${{ runner.temp }}/boringcache-cli-artifact

      - name: Install custom CLI artifact
        if: needs.prepare-cli.outputs.use_custom_cli == 'true'
        run: |
          set -euo pipefail
          bash .benchmark-config/scripts/install-benchmark-cli.sh \
            --artifact-dir "${RUNNER_TEMP}/boringcache-cli-artifact"

      - name: Verify BoringCache CLI
        run: boringcache --version

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libvulkan-dev \
            libasound2-dev libfontconfig1-dev libfreetype6-dev \
            libssl-dev pkg-config cmake \
            libx11-dev libx11-xcb-dev libxcb1-dev \
            libxcursor-dev libxinerama-dev libxi-dev libxrandr-dev

      - name: Configure boringcache/one for Rust toolchain and sccache
        uses: boringcache/one@v1
        with:
          cli-version: skip
          setup: mise
          mode: rust-sccache
          tools: rust@${{ env.CLI_RUST_VERSION }}
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          working-directory: .
          cache-runtime: true
          cache-cargo: true
          cache-target: true
          sccache: true
          verbose: true

      - name: Prepare benchmark scope and helpers
        id: scope
        run: |
          set -euo pipefail

          scope_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          rust_release="$(rustc --version --verbose | awk '/^release:/{print $2}')"
          rust_minor="$(echo "${rust_release}" | awk -F. '{print $1 "." $2}')"
          tag_cargo_registry="${BENCHMARK_ID}-cargo-registry"
          tag_cargo_git="${BENCHMARK_ID}-cargo-git"
          tag_target="${BENCHMARK_ID}-target-rust${rust_minor}"
          # Run-scoped tag ensures cold build starts with empty remote cache.
          # boringcache delete can't purge cache-registry proxy data, so we
          # use a unique tag per run instead.
          tag_sccache="${BENCHMARK_ID}-sccache-rust${rust_minor}-r${GITHUB_RUN_ID}-a${GITHUB_RUN_ATTEMPT}"
          tags_csv="${tag_cargo_registry},${tag_cargo_git},${tag_target},${tag_sccache}"

          echo "scope_started_at=${scope_started_at}" >> "$GITHUB_OUTPUT"
          echo "rust_release=${rust_release}" >> "$GITHUB_OUTPUT"
          echo "rust_minor=${rust_minor}" >> "$GITHUB_OUTPUT"
          echo "tag_cargo_registry=${tag_cargo_registry}" >> "$GITHUB_OUTPUT"
          echo "tag_cargo_git=${tag_cargo_git}" >> "$GITHUB_OUTPUT"
          echo "tag_target=${tag_target}" >> "$GITHUB_OUTPUT"
          echo "tag_sccache=${tag_sccache}" >> "$GITHUB_OUTPUT"
          echo "tags_csv=${tags_csv}" >> "$GITHUB_OUTPUT"

          cat > ./run-zed-sccache-phase.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail

          mode="${1:-warm}"
          phase_label="${BENCHMARK_PHASE_LABEL:-$mode}"

          proxy_port=5000
          proxy_log="/tmp/boringcache-proxy-${proxy_port}.log"
          proxy_pid=""
          proxy_helper=".benchmark-config/scripts/boringcache-proxy.sh"
          timing_file="${BENCHMARK_TIMING_FILE:-}"
          proxy_ready_seconds=""
          build_seconds=""

          write_timing() {
            if [[ -n "$timing_file" ]]; then
              printf '%s=%s\n' "$1" "$2" >> "$timing_file"
            fi
          }

          start_proxy() {
            export BORINGCACHE_PROXY_METADATA_HINTS="project=zed,phase=${phase_label}"
            bash "$proxy_helper" start \
              --workspace "$BENCHMARK_WORKSPACE" \
              --tag "$BORINGCACHE_TAG_SCCACHE" \
              --host 127.0.0.1 \
              --port "$proxy_port" \
              --no-git \
              --verbose >/tmp/boringcache-proxy-start.txt
            proxy_pid="$(grep '^pid=' /tmp/boringcache-proxy-start.txt | cut -d= -f2-)"
          }

          stop_proxy() {
            if [[ -n "${proxy_pid:-}" ]]; then
              bash "$proxy_helper" stop --pid "$proxy_pid" || true
            else
              bash "$proxy_helper" stop || true
            fi
            proxy_pid=""
          }

          wait_for_proxy_ready() {
            local started_at
            started_at="$(date +%s)"
            bash "$proxy_helper" wait --port "$proxy_port" --pid "$proxy_pid"
            proxy_ready_seconds=$(( $(date +%s) - started_at ))
            write_timing proxy_ready_seconds "$proxy_ready_seconds"
          }

          cleanup() {
            stop_proxy
            echo "=== Proxy log (last 200 lines) ==="
            tail -n 200 "$proxy_log" 2>/dev/null || true
            echo "=== End proxy log ==="
          }
          trap cleanup EXIT

          run_cold_build() {
            cargo build --release
          }

          run_cached_build() {
            export SCCACHE_DIR="${HOME}/.cache/sccache"
            export SCCACHE_WEBDAV_ENDPOINT="http://127.0.0.1:${proxy_port}/"
            export SCCACHE_IDLE_TIMEOUT="0"
            export RUSTC_WRAPPER="sccache"
            export CC="sccache cc"
            export CXX="sccache c++"
            mkdir -p "$SCCACHE_DIR"

            local started_at
            started_at="$(date +%s)"
            sccache --start-server || true
            cargo build --release
            sccache --show-stats || true
            # Stop sccache server so it flushes pending uploads to the proxy
            sccache --stop-server || true
            build_seconds=$(( $(date +%s) - started_at ))
            write_timing build_seconds "$build_seconds"
          }

          apply_stale_change() {
            local pattern="$1"
            local fallback="${2:-}"
            local stale_file=""
            while IFS= read -r candidate; do
              stale_file="${candidate}"
              break
            done < <(eval "$pattern")
            if [[ -z "${stale_file}" && -n "${fallback}" ]]; then
              while IFS= read -r candidate; do
                stale_file="${candidate}"
                break
              done < <(eval "$fallback")
            fi
            if [[ -z "${stale_file}" ]]; then
              echo "No Rust source file found for stale mutation" >&2
              exit 1
            fi

            echo "// benchmark stale mutation ${GITHUB_RUN_ID:-local}-$(date +%s)" >> "${stale_file}"
            echo "Applied stale change to ${stale_file}"
          }

          if [[ -n "$timing_file" ]]; then
            : > "$timing_file"
          fi

          case "$mode" in
            cold)
              run_cold_build
              ;;
            seed|warm)
              start_proxy
              if ! wait_for_proxy_ready; then
                echo "Registry proxy did not become ready" >&2
                tail -n 200 "$proxy_log" || true
                exit 1
              fi
              run_cached_build
              stop_proxy
              ;;
            stale-low)
              start_proxy
              if ! wait_for_proxy_ready; then
                echo "Registry proxy did not become ready" >&2
                tail -n 200 "$proxy_log" || true
                exit 1
              fi
              apply_stale_change "git ls-files -- 'crates/*/tests/**/*.rs' 'crates/storybook/**/*.rs' | head -n1" "git ls-files -- '*.rs' | head -n1"
              run_cached_build
              stop_proxy
              ;;
            stale-mid)
              start_proxy
              if ! wait_for_proxy_ready; then
                echo "Registry proxy did not become ready" >&2
                tail -n 200 "$proxy_log" || true
                exit 1
              fi
              apply_stale_change "git ls-files -- 'crates/editor/src/**/*.rs' 'crates/project/src/**/*.rs' | head -n1"
              run_cached_build
              stop_proxy
              ;;
            stale-high)
              start_proxy
              if ! wait_for_proxy_ready; then
                echo "Registry proxy did not become ready" >&2
                tail -n 200 "$proxy_log" || true
                exit 1
              fi
              apply_stale_change "git ls-files -- 'crates/gpui/src/**/*.rs' 'crates/settings/src/**/*.rs' | head -n1"
              run_cached_build
              stop_proxy
              ;;
            *)
              echo "Unknown mode: $mode" >&2
              exit 1
              ;;
          esac
          SH
          chmod +x ./run-zed-sccache-phase.sh

      - name: Purge BoringCache benchmark tags
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
        run: |
          set -euo pipefail
          boringcache delete --no-git "$BENCHMARK_WORKSPACE" "${{ steps.scope.outputs.tags_csv }}" || true

      - name: Configure boringcache/one for Rust archives
        uses: boringcache/one@v1
        with:
          cli-version: skip
          setup: mise
          mode: rust-sccache
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          working-directory: .
          cache-tag: ${{ env.BENCHMARK_ID }}
          cache-cargo: true
          cache-target: true
          tools: rust@${{ env.CLI_RUST_VERSION }}
          sccache: true
          cargo-tag: ${{ steps.scope.outputs.tag_cargo_registry }}
          cargo-git-tag: ${{ steps.scope.outputs.tag_cargo_git }}
          target-tag: ${{ steps.scope.outputs.tag_target }}
          verbose: true
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}

      - name: Run cold + seed cache build
        id: cold_baseline_build
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
          BORINGCACHE_TAG_SCCACHE: ${{ steps.scope.outputs.tag_sccache }}
        run: |
          set -euo pipefail
          rm -rf target "$HOME/.cargo/registry" "$HOME/.cargo/git" "$HOME/.cache/sccache"
          mkdir -p target "$HOME/.cargo/registry" "$HOME/.cargo/git" "$HOME/.cache/sccache"

          start="$(date +%s)"
          ./run-zed-sccache-phase.sh seed
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Collect BoringCache diagnostics
        if: always()
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
        run: |
          set -euo pipefail
          .benchmark-config/scripts/collect-boringcache-diagnostics.sh \
            --output-dir "boringcache-diag-seed" \
            --workspace "$BENCHMARK_WORKSPACE" \
            --tags "${{ steps.scope.outputs.tags_csv }}" \
            --phase "seed" \
            --cache-tag "${{ steps.scope.outputs.tag_sccache }}" \
            --cli-source "${{ needs.prepare-cli.outputs.cli_source }}" \
            --cli-ref "${{ needs.prepare-cli.outputs.cli_ref }}" \
            --proxy-port "5000" \
            --proxy-log-path "/tmp/boringcache-proxy-5000.log" \
            --cache-root "$HOME/.cache/sccache" \
            --cache-label "sccache-cache"

      - name: Upload BoringCache diagnostics
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: boringcache-diag-${{ env.BENCHMARK_ID }}-seed-boringcache
          path: boringcache-diag-seed
          if-no-files-found: warn


  scenario-builds:
    name: sccache Scenario (${{ matrix.phase }}) (BoringCache)
    needs: [prepare-cli, seed-cache]
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        phase: [warm1, warm2, stale-low, stale-mid, stale-high]
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v5
        with:
          repository: ${{ env.PROJECT_REPO }}
          ref: ${{ env.PROJECT_REF }}

      - name: Checkout benchmark config
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          path: .benchmark-config

      - name: Install BoringCache CLI with boringcache/one
        uses: boringcache/one@v1
        with:
          setup: none
          mode: archive
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          cli-platform: linux-amd64
          cache-runtime: false

      - name: Download custom CLI artifact
        if: needs.prepare-cli.outputs.use_custom_cli == 'true'
        uses: actions/download-artifact@v5
        with:
          name: ${{ needs.prepare-cli.outputs.artifact_name }}
          path: ${{ runner.temp }}/boringcache-cli-artifact

      - name: Install custom CLI artifact
        if: needs.prepare-cli.outputs.use_custom_cli == 'true'
        run: |
          set -euo pipefail
          bash .benchmark-config/scripts/install-benchmark-cli.sh \
            --artifact-dir "${RUNNER_TEMP}/boringcache-cli-artifact"

      - name: Verify BoringCache CLI
        run: boringcache --version

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libvulkan-dev \
            libasound2-dev libfontconfig1-dev libfreetype6-dev \
            libssl-dev pkg-config cmake \
            libx11-dev libx11-xcb-dev libxcb1-dev \
            libxcursor-dev libxinerama-dev libxi-dev libxrandr-dev

      - name: Configure boringcache/one for Rust toolchain and sccache
        uses: boringcache/one@v1
        with:
          cli-version: skip
          setup: mise
          mode: rust-sccache
          tools: rust@${{ env.CLI_RUST_VERSION }}
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          working-directory: .
          cache-runtime: true
          cache-cargo: true
          cache-target: true
